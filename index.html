<!-- ===== CARTER'S 解析器(移植自已驗證的 Python 版,瀏覽器內解析)===== -->
<script>
(function(){
  function clean(s){if(s==null)return "";s=String(s).replace(/\n/g," ").trim();return s.replace(/\s+/g," ");}
  function toQty(v){
    if(typeof v==="boolean")return null;
    if(typeof v==="number")return v>0?Math.trunc(v):null;
    const s=clean(v);
    if(/^\d+(\.0+)?$/.test(s)){const n=Math.trunc(parseFloat(s));return n>0?n:null;}
    return null;
  }
  function normStyle(s){
    s=clean(s);let part="";
    const partMatch=s.match(/(上衣|裤子|褲子|頭巾|短袖|長袖|长袖|短裤|長褲|长裤|背心)/);
    if(partMatch){part=partMatch[1];if(part==="褲子")part="裤子";}
    // 先去掉部位名稱,再只取款號本體(英數)
    let main=s.replace(/\s*(上衣|裤子|褲子|頭巾|短袖|長袖|长袖|短裤|長褲|长裤|背心)\s*/g,"").trim();
    // 只保留款號本體(大寫字母+數字),去掉尾巴的中文
    const styleOnly=main.match(/^([A-Za-z]{2,4}\d[A-Za-z0-9]*)/);
    if(styleOnly)main=styleOnly[1].toUpperCase();
    return [main,part];
  }
  function parseColor(raw){
    const c=clean(raw);const m=c.match(/^([A-Z]{2,4}\d{1,3})\s*(.*)$/);
    return [m?m[1]:"", m?m[2]:c];
  }
  function looksLikeSize(v){
    let s=clean(v).toUpperCase();if(s==="")return false;
    if(["NB","XS","S","M","L","XL","XXL","XXXL","PP","P"].includes(s))return true;
    if(/^\d{1,3}M$/.test(s))return true;
    if(/^\d[T]$/.test(s))return true;
    if(/^\d{2,3}CM$/.test(s))return true;
    if(/^\d{1,2}(\.0)?$/.test(s)){const n=Math.trunc(parseFloat(s));return n>=2&&n<=16;}
    return false;
  }
  function cellVal(rows,r,c){if(r<0||r>=rows.length)return "";const row=rows[r];if(!row||c<0||c>=row.length)return "";const v=row[c];return v==null?"":v;}
  function nrows(rows){return rows.length;}
  function ncols(rows){return rows.reduce((m,r)=>Math.max(m,r?r.length:0),0);}
  function findSizeHeader(rows){
    let best=[null,{}];const lim=Math.min(6,nrows(rows));const nc=ncols(rows);
    for(let r=0;r<lim;r++){const sizemap={};
      for(let c=0;c<nc;c++){const v=cellVal(rows,r,c);
        if(looksLikeSize(v)){let s=clean(v).toUpperCase();if(/^\d{1,2}(\.0)?$/.test(s))s=String(Math.trunc(parseFloat(s)));sizemap[c]=s;}}
      if(Object.keys(sizemap).length>Object.keys(best[1]).length)best=[r,sizemap];
    }
    if(best[0]!==null&&Object.keys(best[1]).length>=2)return best;
    return [null,{}];
  }
  function isASheet(name){return (name.includes("A品")||name.includes("A 品"))&&!name.includes("B品")&&!name.includes("B-品");}
  // B品頁籤:只要名稱裡含有「B品」兩字就算(包含GACB品、KAC-B品、B品、B-品等)
  function isBSheet(name){return /B[\s-]*品/.test(name);}
  // 判斷B品頁籤用的是「新格式」(跟A品欄位一樣,按尺碼展開)還是「舊格式」(只有總量一欄)
  function isBSheetNewFormat(rows){
    const [hdrRow,sizemap]=findSizeHeader(rows);
    return hdrRow!==null&&Object.keys(sizemap).length>2; // 有多個尺碼欄=新格式
  }
  function lineCode(sheetName){
    const n=clean(sheetName);const m=n.match(/^([A-Z]{2,4})/);let base=m?m[1]:n;let sub="";
    if(n.includes("上衣"))sub="上衣";else if(n.includes("裤子")||n.includes("褲子"))sub="裤子";
    return (base+sub).trim();
  }
  function grabPrintMark(rows,r){
    const row=rows[r];if(!row)return "";
    for(let c=row.length-1;c>=29;c--){let v=clean(cellVal(rows,r,c));if(v&&/[印绣繡花素]/.test(v))return v;}
    return "";
  }
  function parseASheet(rows,sheetName,period){
    const [hdrRow,sizemap]=findSizeHeader(rows);
    if(hdrRow===null||Object.keys(sizemap).length===0)return [];
    const styleCol=3,colorCol=4;const records=[];const nc=ncols(rows);
    for(let r=hdrRow+1;r<nrows(rows);r++){
      let styleRaw=styleCol<nc?clean(cellVal(rows,r,styleCol)):"";
      if(styleRaw.toUpperCase().startsWith("TTL"))continue;
      if(clean(cellVal(rows,r,0)).toUpperCase().startsWith("TTL"))continue;
      if(!styleRaw||!/[A-Z]{2,4}\d/.test(styleRaw))continue;
      const [style,part]=normStyle(styleRaw);
      const [cc,cd]=parseColor(colorCol<nc?cellVal(rows,r,colorCol):"");
      const pm=grabPrintMark(rows,r);
      for(const c in sizemap){const size=sizemap[c];const q=toQty(cellVal(rows,r,parseInt(c)));
        if(q)records.push({period,line:lineCode(sheetName),grade:"A",style_no:style,part,color_code:cc,color_desc:cd,size,qty:q,brand:"Carter",print_mark:pm});}
    }
    return records;
  }
  function parseBSheet(rows,period){
    let hdr=null,cols=null;const lim=Math.min(5,nrows(rows));const nc=ncols(rows);
    for(let r=0;r<lim;r++){const row=[];for(let c=0;c<nc;c++)row.push(clean(cellVal(rows,r,c)));
      const j=row.join(" ");if(j.includes("款號")&&(j.includes("数量")||j.includes("數量"))){hdr=r;cols=row;break;}}
    if(hdr===null)return [];
    const colidx=(...keys)=>{for(let i=0;i<cols.length;i++)if(keys.some(k=>cols[i].includes(k)))return i;return null;};
    const ciStyle=colidx("款號"),ciColor=colidx("顏色","顔色"),ciQty=colidx("数量","數量");
    const records=[];
    for(let r=hdr+1;r<nrows(rows);r++){
      const styleRaw=ciStyle!==null?clean(cellVal(rows,r,ciStyle)):"";
      if(!styleRaw||!/[A-Z]{2,4}\d/.test(styleRaw))continue;
      const qty=ciQty!==null?toQty(cellVal(rows,r,ciQty)):null;if(!qty)continue;
      const [cc,cd]=parseColor(ciColor!==null?cellVal(rows,r,ciColor):"");
      const [bs,bp]=normStyle(styleRaw);
      records.push({period,line:"B品",grade:"B",style_no:bs,part:bp,color_code:cc,color_desc:cd,size:"(未分尺碼)",qty,brand:"Carter",print_mark:""});
    }
    return records;
  }
  function periodFromFilename(fn){
    // 支援: 2024-07、2024年07月、2024- 07月、2024_07 等格式
    let m=fn.match(/(\d{4})\s*[-_年]\s*0*(\d{1,2})\s*月?/);
    if(m)return m[1]+"-"+String(m[2]).padStart(2,"0");
    return "";
  }
  function brandFromFilename(fn){
    let s=fn.replace(/\.(xls|xlsx)$/i,"").replace(/複本\s*/g,"").replace(/庫存總表|庫存表|總表|存量表/g,"").trim();
    // 找連續英文字母(品牌名)
    let m=s.match(/([A-Za-z']{3,}(?:[\s_][A-Za-z']+)*)/);
    let brand=m?m[1].replace(/_/g," ").trim():"";
    if(/carter/i.test(brand))brand="Carter's";
    if(/garan/i.test(brand))brand="GARAN";
    return brand||"(未知品牌)";
  }
  window.brandFromFilename=brandFromFilename;
  window.periodFromFilename=periodFromFilename;
  window.parseCartersWorkbook=function(arrayBuffer,filename){
    const period=periodFromFilename(filename);
    const wb=XLSX.read(arrayBuffer,{type:"array"});
    let recs=[];
    for(const name of wb.SheetNames){
      const ws=wb.Sheets[name];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
      if(isBSheet(name)){
        // 自動判斷新格式(欄位跟A品一樣)或舊格式
        if(isBSheetNewFormat(rows)){
          // 新格式:用A品解析器,但強制grade=B
          const aRecs=parseASheet(rows,name,period);
          aRecs.forEach(r=>r.grade="B");
          recs=recs.concat(aRecs);
        }else{
          recs=recs.concat(parseBSheet(rows,period));
        }
      }
      else if(isASheet(name))recs=recs.concat(parseASheet(rows,name,period));
    }
    return recs;
  };
})();
</script>

<script type="text/babel">

// 用 range 分頁拿全部資料,繞過 PostgREST 1000 筆預設限制
async function fetchAllRange(buildQuery,pageSize=1000){
  let all=[];let from=0;
  while(true){
    const {data,error}=await buildQuery().range(from,from+pageSize-1);
    if(error)throw error;
    if(!data||data.length===0)break;
    all=all.concat(data);
    if(data.length<pageSize)break;
    from+=pageSize;
    if(from>50000)break; // 安全上限
  }
  return all;
}

  const [fBrand,setFBrand]=useState(''),[fPeriod,setFPeriod]=useState('');
  const [brandMgmt,setBrandMgmt]=useState(false),[editingBrand,setEditingBrand]=useState(null),[newBrandName,setNewBrandName]=useState("");
  useEffect(()=>{(async()=>{
    try{
      const {data:bb,error:e1}=await sb.from('v_stock_by_brand').select('*');if(e1)throw e1;
      // 用新視圖 v_stock_by_grade 直接拿 A/B 加總(資料庫端 group by)
      const {data:bg,error:e2}=await sb.from('v_stock_by_grade').select('*');
      const {data:batches,error:e4}=await sb.from('v_batches').select('*').limit(10000);if(e4)throw e4;
      const total=(bb||[]).reduce((s,r)=>s+(r.total_qty||0),0);

        bg.forEach(r=>{
          const g=String(r.grade||'').toUpperCase().trim();
          if(g==='A')A=r.total_qty||0;
          else if(g==='B')B=r.total_qty||0;
        });
      }else{
        // fallback:若 v_stock_by_grade 視圖還沒建,用 v_inventory 補(可能會被 1000 筆限制)
        const {data:inv}=await sb.from('v_inventory').select('grade,total_qty').limit(100000);
        (inv||[]).forEach(r=>{
          const q=r.total_qty||0;
          const g=String(r.grade||'').toUpperCase().trim();
          if(g==='A')A+=q;
          else if(g==='B')B+=q;
        });
      }
      setD({byBrand:(bb||[]).map(r=>({name:r.brand,value:r.total_qty,styles:r.style_count})).sort((a,b)=>b.value-a.value),
        total,A,B,batches:batches||[]});
    }catch(e){setErr(e.message);}
  })();},[]);
  if(err)return <ErrBox msg={err}/>;if(!d)return <Loading/>;
  const today=new Date().toISOString().slice(0,10);
  // 篩選選項
  const allBrands=[...new Set(d.batches.filter(b=>(b.total_qty||0)>0).map(b=>b.brand).filter(Boolean))].sort();
  const allPeriods=[...new Set(d.batches.filter(b=>(b.total_qty||0)>0&&/^\d{4}-\d{2}$/.test(b.period||'')).map(b=>b.period))].sort().reverse();
  // 套用篩選到批次
  let fb=d.batches.filter(b=>(b.total_qty||0)>0); // 只顯示還有庫存的批次

  // 各品牌(若有篩品牌就只顯示該品牌的批次彙總,否則用全品牌彙總)
  const byBrandShow = filtered
    ? Object.entries(fb.reduce((m,b)=>{m[b.brand]=(m[b.brand]||0)+(b.total_qty||0);return m;},{})).map(([name,value])=>({name,value})).filter(r=>r.value>0).sort((a,b)=>b.value-a.value)
    : d.byBrand.filter(r=>r.value>0);
  const max=Math.max(1,...byBrandShow.map(x=>x.value));
  const kpis=filtered

  const renameBrand=async(on,nn)=>{if(!nn.trim()||nn===on)return;try{await sb.from('brands').update({name:nn}).eq('name',on);await sb.from('import_batches').update({brand:nn}).eq('brand',on);setEditingBrand(null);setNewBrandName("");setD(null);}catch(e){alert('更新失敗:'+e.message);}};;
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";

  },300);return()=>clearTimeout(t);},[grade,brand,print,q,fileq]);
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";

  const printTag=(p)=>{if(!p)return <span className="text-slate-300 text-xs">—</span>;const has=/有/.test(p);return <span className={`px-2 py-0.5 rounded text-xs font-semibold ${has?'bg-violet-100 text-violet-700':'bg-slate-100 text-slate-500'}`}>{has?'有印花':'無印花'}</span>;};

      g.size_label=g._sizes.length===0?'(全尺碼)':(g._sizes.length<=4?g._sizes.join('/'):g._sizes.length+'碼');
      return g;
    }).sort((a,b)=>{
      const ka=(a.style_no||'')+'|'+(a.color_code||'')+'|'+(a.color_desc||'')+'|'+(a.grade||'');
      const kb=(b.style_no||'')+'|'+(b.color_code||'')+'|'+(b.color_desc||'')+'|'+(b.grade||'');
      return ka.localeCompare(kb);

  const exportExcel=async(rawData,mode)=>{

      const ws=window.XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols']=[{wch:12},{wch:14},{wch:8},{wch:20},{wch:10},{wch:6},{wch:12},{wch:8},{wch:12},{wch:30},{wch:8},{wch:60}];

      window.XLSX.writeFile(wb,'StockSense_庫存_'+(mode==='group'?'分組_':'')+new Date().toISOString().slice(0,10)+'.xlsx');
    }catch(e){alert('導出失敗:'+e.message);}
    setExporting(false);
  };
  const exportPDF=async(rawData,mode)=>{
    const data=buildExportData(rawData,mode);
    if(!data||!data.length){alert('沒有資料可導出');return;}
    if(!window.html2canvas||!window.jspdf){
      alert('PDF 函式庫尚未載入,請重新整理頁面');return;
    }
    setExporting(true);
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:99999;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML='<div style="background:#fff;padding:24px 32px;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,0.3);font-family:sans-serif;min-width:280px;text-align:center"><div style="font-size:15px;font-weight:600;color:#1e293b;margin-bottom:8px">產生 PDF 中</div><div id="__pdf_prog__" style="font-size:13px;color:#64748b">準備中…</div></div>';
    document.body.appendChild(overlay);
    const setProg=(t)=>{const el=document.getElementById('__pdf_prog__');if(el)el.textContent=t;};
    let container=null;
    try{
      // === 步驟1:把圖片預載成 base64 ===
      const urls=[...new Set(data.filter(d=>d.image_url).map(d=>d.image_url))];
      const cache={};
      let done=0;
      setProg('載入 0/'+urls.length+' 張圖片…');
      await Promise.all(urls.map(async url=>{
        try{
          const r=await fetch(url);
          if(!r.ok)throw new Error('http '+r.status);
          const blob=await r.blob();
          cache[url]=await new Promise((res,rej)=>{
            const fr=new FileReader();
            fr.onload=()=>res(fr.result);
            fr.onerror=()=>rej(new Error('fr fail'));
            fr.readAsDataURL(blob);
          });
        }catch(e){console.warn('圖片載入失敗:',url,e.message);cache[url]=null;}
        done++;setProg('載入 '+done+'/'+urls.length+' 張圖片…');
      }));
      console.log('[PDF] 圖片載入完成, 成功:',Object.values(cache).filter(v=>v).length,'/',urls.length);
      
      // === 步驟2:建立 PDF 內容容器(放在頁面上,被 overlay 蓋住) ===
      setProg('排版中…');
      container=document.createElement('div');
      container.id='__pdf_container__';
      container.style.cssText='position:fixed;left:0;top:0;width:1240px;background:#ffffff;padding:24px;font-family:"Microsoft JhengHei","Noto Sans TC","PingFang TC","Heiti TC",sans-serif;color:#0f172a;z-index:1;line-height:1.5;box-sizing:border-box;';
      const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const totA=data.filter(d=>d.grade==='A').reduce((s,d)=>s+(d.total_qty||0),0);
      const totB=data.filter(d=>d.grade==='B').reduce((s,d)=>s+(d.total_qty||0),0);
      const tot=data.reduce((s,d)=>s+(d.total_qty||0),0);
      let h='<div style="font-size:22px;font-weight:bold;margin-bottom:6px;color:#0f172a">StockSense 庫存報表</div>';
      h+='<div style="font-size:12px;color:#64748b;margin-bottom:14px">導出時間: '+new Date().toLocaleString('zh-TW')+' &nbsp;|&nbsp; 共 '+data.length+' 筆 &nbsp;|&nbsp; <span style="color:#059669;font-weight:600">A 品 '+totA+'</span> / <span style="color:#d97706;font-weight:600">B 品 '+totB+'</span> / <span style="font-weight:700">總 '+tot+' 件</span>'+(mode==='group'?' &nbsp;|&nbsp; <span style="color:#6366f1;font-weight:600">分組排序(款號→色號→等級)</span>':'')+'</div>';
      h+='<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#f1f5f9">';
      ['圖片','品牌','款號','色號','顏色','等級','印花','尺碼','件數'].forEach(t=>{h+='<th style="padding:8px;text-align:left;font-weight:700;border:1px solid #cbd5e1;color:#0f172a">'+t+'</th>';});
      h+='</tr></thead><tbody>';
      data.forEach(d=>{
        h+='<tr>';
        const img=d.image_url?cache[d.image_url]:null;
        if(img){
          h+='<td style="padding:4px;border:1px solid #cbd5e1;width:60px"><img src="'+img+'" style="width:50px;height:50px;object-fit:cover;border-radius:4px;display:block"/></td>';
        }else{
          h+='<td style="padding:4px;border:1px solid #cbd5e1;width:60px;text-align:center;color:#94a3b8;font-size:9px">無圖</td>';
        }
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1">'+esc(d.brand)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1;font-family:monospace">'+esc(d.style_no)+(d.part?'/'+esc(d.part):'')+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1">'+esc(d.color_code)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1">'+esc(d.color_desc)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1;text-align:center">'+esc(d.grade)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1">'+esc(d.print_mark)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1">'+esc(d.size_label)+'</td>';
        h+='<td style="padding:6px 8px;border:1px solid #cbd5e1;font-weight:700;text-align:right">'+(d.total_qty||0)+'</td>';

      // 確認容器有實際尺寸

      if(rect.width<50||rect.height<50)throw new Error('PDF 容器渲染失敗(尺寸過小)');
      
      // === 步驟3:用 html2canvas 截圖 ===
      setProg('截圖中…');
      const canvas=await window.html2canvas(container,{
        scale:1.5,
        useCORS:false,
        allowTaint:false,

        logging:false,
        width:container.offsetWidth,
        height:container.offsetHeight,
        windowWidth:container.offsetWidth,
        scrollY:-window.scrollY
      });
      console.log('[PDF] canvas 尺寸:',canvas.width,'x',canvas.height);
      
      // === 步驟4:用 jsPDF 嵌入 canvas 並儲存 ===

      // 把 canvas 等比縮放到 usableW
      const imgW=usableW;
      const imgH=canvas.height*(imgW/canvas.width);
      const imgData=canvas.toDataURL('image/jpeg',0.92);
      // 多頁處理
      if(imgH<=usableH){
        pdf.addImage(imgData,'JPEG',margin,margin,imgW,imgH);
      }else{
        // 圖片高過一頁,分頁切割
        let yOffset=0;
        while(yOffset<imgH){
          if(yOffset>0)pdf.addPage();
          pdf.addImage(imgData,'JPEG',margin,margin-yOffset,imgW,imgH);
          // 蓋住超出頁面的部分(用白色矩形)
          if(yOffset+usableH<imgH){
            pdf.setFillColor(255,255,255);
            pdf.rect(0,pageH-margin,pageW,margin,'F');
          }
          yOffset+=usableH;
        }
      }
      pdf.save('StockSense_庫存_'+new Date().toISOString().slice(0,10)+'.pdf');
      console.log('[PDF] 完成');
    }catch(e){
      console.error('[PDF] 錯誤:',e);
      alert('PDF 導出失敗: '+(e.message||e));
    }
    if(container&&container.parentNode)container.parentNode.removeChild(container);
    if(overlay.parentNode)overlay.parentNode.removeChild(overlay);
    setExporting(false);
  };return <div className="p-4 md:p-8"><Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <div className="flex items-center gap-1">
        <select className={sel} value={brand} onChange={e=>setBrand(e.target.value)}><option value="">全部品牌</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
        <button onClick={()=>setBrandMgmt(!brandMgmt)} title="管理品牌名稱" className="p-2 rounded-lg bg-slate-50 hover:bg-indigo-50 text-slate-500 hover:text-indigo-600">✏</button>
      </div>
      <select className={sel} value={grade} onChange={e=>setGrade(e.target.value)}><option value="">A/B 品</option><option value="A">A 品</option><option value="B">B 品</option></select>
      <select className={sel} value={print} onChange={e=>setPrint(e.target.value)}><option value="">印花不限</option><option value="Y">有印花</option><option value="N">無印花</option></select>
      <input className={sel+" flex-1 min-w-[130px]"} placeholder="搜尋款號/顏色…" value={q} onChange={e=>setQ(e.target.value)}/>
      <select className={sel+" max-w-[260px]"} value={fileq} onChange={e=>setFileq(e.target.value)}><option value="">全部來源檔</option>{files.map(f=><option key={f} value={f} title={f}>{f.length>30?f.slice(0,29)+'…':f}</option>)}</select>
      {rows&&<>
        <Pill tone="indigo">{fmt(rows.length)} 列</Pill>
        <Pill tone="A">A品 {fmt(rows.filter(r=>r.grade==='A').reduce((s,r)=>s+(r.total_qty||0),0))}</Pill>
        <Pill tone="B">B品 {fmt(rows.filter(r=>r.grade==='B').reduce((s,r)=>s+(r.total_qty||0),0))}</Pill>
        <Pill tone="slate">總 {fmt(rows.reduce((s,r)=>s+(r.total_qty||0),0))} 件</Pill>
      </>}
      <button onClick={()=>exportExcel(rows)} disabled={exporting||!rows||!rows.length} className="px-3 py-2 rounded-xl bg-emerald-600 text-white text-sm font-semibold disabled:opacity-40">⬇ Excel</button>
      <div className="relative inline-block">
        <button onClick={()=>setExportMenu(!exportMenu)} disabled={exporting||!rows||!rows.length} className="px-3 py-2 rounded-xl bg-rose-600 text-white text-sm font-semibold disabled:opacity-40">⬇ PDF ▾</button>
        {exportMenu&&<div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-50 min-w-[200px] py-1">
          <button onClick={()=>{setExportMenu(false);exportPDF(rows,'default');}} className="w-full text-left px-4 py-2 text-sm hover:bg-slate-50">標準排序(依數量)</button>
          <button onClick={()=>{setExportMenu(false);exportPDF(rows,'group');}} className="w-full text-left px-4 py-2 text-sm hover:bg-slate-50">分組(款號→色號→等級)</button>
        </div>}
      </div>
    </div>
    {brandMgmt&&<div className="px-4 md:px-6 py-3 border-b border-slate-100 bg-slate-50/50"><div className="text-xs font-semibold text-slate-400 mb-2">點擊品牌名稱可重新命名</div><div className="flex flex-wrap gap-2">{brands.map(b=><div key={b} className="flex items-center gap-1.5">{editingBrand===b?<><input autoFocus value={newBrandName} onChange={e=>setNewBrandName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&renameBrand(b,newBrandName)} className="text-xs border border-indigo-300 rounded-lg px-2 py-1 w-28 outline-none"/><button onClick={()=>renameBrand(b,newBrandName)} className="text-xs text-indigo-600 font-semibold">確認</button><button onClick={()=>setEditingBrand(null)} className="text-xs text-slate-400">取消</button></>:<button onClick={()=>{setEditingBrand(b);setNewBrandName(b);}} className="text-xs bg-white hover:bg-indigo-50 text-slate-700 px-3 py-1.5 rounded-lg font-semibold border border-slate-200">✏ {b}</button>}</div>)}</div></div>}
    {err?<ErrBox msg={err}/>:!rows?<Loading/>:rows.length===0?<Empty msg="無符合資料"/>:
    <div className="overflow-auto" style={{maxHeight:540}}><table className="w-full">
      <thead className="bg-slate-50/80 sticky top-0"><tr>{['圖片','品牌','款號','色號','顏色','產品線','等級','印花','尺碼','來源檔','件數'].map((h,i)=><th key={h} className={`px-3 py-3 text-xs font-semibold text-slate-400 uppercase ${i===10?'text-right':'text-left'}`}>{h}</th>)}</tr></thead>
      <tbody className="divide-y divide-slate-50">{rows.map((d,i)=><tr key={i} className="hover:bg-slate-50">
        <td className="px-3 py-2">{d.image_url?<img src={d.image_url} alt="" className="w-12 h-12 object-cover rounded-lg cursor-pointer" onClick={()=>setZoom(d.image_url)}/>:<div className="w-12 h-12 rounded-lg bg-slate-100 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>}</td>
        <td className="px-3 py-3 text-sm font-semibold text-slate-700">{d.brand||'—'}</td>
        <td className="px-3 py-3 font-mono font-semibold text-sm">{d.style_no}{d.part?<span className="text-slate-400">/{d.part}</span>:''}</td>
        <td className="px-3 py-3 font-mono text-sm text-indigo-600">{d.color_code}</td>
        <td className="px-3 py-3 text-sm text-slate-500 max-w-[140px] truncate">{d.color_desc}</td>
        <td className="px-3 py-3 font-mono text-sm text-slate-600">{d.brand_line}</td>
        <td className="px-3 py-3"><Pill tone={d.grade}>{d.grade}</Pill></td>
        <td className="px-3 py-3">{printTag(d.print_mark)}</td>
        <td className="px-3 py-3 font-mono text-sm">{d.size_label}</td>

        <td className="px-3 py-3 text-xs text-slate-400 max-w-[140px] truncate" title={d.last_filename}>{d.last_filename||'—'}</td>
        <td className="px-3 py-3 font-mono font-semibold text-sm text-right">{fmt(d.total_qty)}</td></tr>)}</tbody>
    </table></div>}
  </Card>
  {zoom&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-6" onClick={()=>setZoom(null)}><img src={zoom} className="max-w-full max-h-full rounded-xl" alt=""/></div>}
  {previewModal&&rows&&<ExportPreviewModal format={previewModal.format} mode={previewModal.mode} rows={rows} buildExportData={buildExportData} onChangeMode={(m)=>setPreviewModal({...previewModal,mode:m})} onCancel={()=>setPreviewModal(null)} onConfirm={()=>{const fmt=previewModal.format;const mode=previewModal.mode;setPreviewModal(null);if(fmt==='excel')exportExcel(rows,mode);else exportPDF(rows,mode);}} exporting={exporting}/>}
  </div>;
}


// ===== Excel 匯入(瀏覽器解析 → rpc_import_records)=====
function ImportPage(){
  // 支援批量上傳:queue 是待處理的檔案清單
  const [queue,setQueue]=useState([]); // [{file,status,result,error}]
  const [current,setCurrent]=useState(null); // 正在處理的那個
  const [stage,setStage]=useState('idle'); // idle|edit|done|batch_done
  const [busy,setBusy]=useState(false),[err,setErr]=useState("");
  const [file,setFile]=useState(null),[rows,setRows]=useState([]);
  const [brand,setBrand]=useState(""),[period,setPeriod]=useState(""),[release,setRelease]=useState("");
  const [result,setResult]=useState(null);
  const [imgMap,setImgMap]=useState({});
  const [extracting,setExtracting]=useState(false),[extractMsg,setExtractMsg]=useState("");
  const PRINT_OPTS=["","有印花繡花","無印花繡花"];

  const processFile=async(f)=>{
    setBusy(true);setErr("");setResult(null);setImgMap({});setExtractMsg("");
    try{
      const buf=await f.arrayBuffer();
      const r=window.parseCartersWorkbook(buf,f.name);
      if(!r.length)throw new Error("這個檔案解析不到資料");
      r.forEach(x=>{const p=x.print_mark||"";x.print_mark=/有|印|绣|繡|花/.test(p)&&!/無|无/.test(p)?"有印花繡花":(/無|无/.test(p)?"無印花繡花":"");});
      setFile(f);setRows(r);
      setBrand(window.brandFromFilename(f.name));
      setPeriod(window.periodFromFilename(f.name));setRelease("");
      setStage('edit');
      extractImages(f);
    }catch(ex){setErr(ex.message);}
    setBusy(false);
  };

  const onFiles=async(e)=>{
    const files=Array.from(e.target.files);
    e.target.value="";
    if(!files.length)return;
    if(files.length===1){processFile(files[0]);return;}
    // 批量模式:先建初始 queue 進入畫面
    setBusy(true);
    const initQ=files.map(f=>({file:f,status:'parsing',result:null,error:null,imgStatus:'抽圖中…'}));
    setQueue(initQ);setStage('batch_queue');
    // 並行:每個檔案立即解析(算 A/B/總件數) + 背景抽圖
    const q=[...initQ];
    await Promise.all(files.map(async(f,i)=>{
      // 解析 Excel
      try{
        const buf=await f.arrayBuffer();
        const r=window.parseCartersWorkbook(buf,f.name);
        if(!r.length)throw new Error("解析不到資料");
        r.forEach(x=>{const p=x.print_mark||"";x.print_mark=/有|印|绣|繡|花/.test(p)&&!/無|无/.test(p)?"有印花繡花":(/無|无/.test(p)?"無印花繡花":"");});
        const clean=r.filter(x=>x.style_no&&parseInt(x.qty)>0).map(x=>({...x,qty:parseInt(x.qty)}));
        q[i]={...q[i],
          status:'pending',
          parsed:clean,
          parsedBrand:window.brandFromFilename(f.name),
          parsedPeriod:window.periodFromFilename(f.name),
          totalQty:clean.reduce((s,x)=>s+x.qty,0),
          qtyA:clean.filter(x=>x.grade==='A').reduce((s,x)=>s+x.qty,0),
          qtyB:clean.filter(x=>x.grade==='B').reduce((s,x)=>s+x.qty,0)
        };
        setQueue([...q]);
      }catch(ex){
        q[i]={...q[i],status:'error',error:ex.message,imgStatus:null};
        setQueue([...q]);
        return;
      }
      // 背景抽圖(獨立非同步,使用者可同時看 A/B/總件數)
      (async()=>{try{
        const session=await sb.auth.getSession();const token=session?.data?.session?.access_token;
        if(!token){q[i].imgStatus='無法抽圖';setQueue([...q]);return;}
        const fd=new FormData();fd.append('file',f);
        const res=await fetch(`${window.CONFIG.BACKEND_URL}/extract`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
        if(res.ok){
          const d=await res.json();
          if(d.ok&&d.results){
            for(const rx of d.results){if(rx.image_url)await sb.from('products').update({image_url:rx.image_url}).eq('style_no',rx.style_no).is('image_url',null);}
            q[i].imgStatus=`已抽圖 ${d.uploaded}/${d.extracted} 張`;
            q[i].imgResults=d.results;
          }else{q[i].imgStatus='抽圖回應異常';}
        }else{q[i].imgStatus='抽圖失敗';}
      }catch(e){q[i].imgStatus='抽圖失敗';}
      setQueue([...q]);})();
    }));
    setBusy(false);
  };

  const extractImages=async(f)=>{
    if(!window.CONFIG.BACKEND_URL)return;
    setExtracting(true);setExtractMsg("後端抽圖中…");
    try{
      const session=await sb.auth.getSession();
      const token=session?.data?.session?.access_token;
      if(!token){setExtractMsg("⚠ 無法取得登入 token");setExtracting(false);return;}
      const fd=new FormData();fd.append('file',f);
      const res=await fetch(`${window.CONFIG.BACKEND_URL}/extract`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
      if(!res.ok){const t=await res.text();throw new Error(`後端回應${res.status}: ${t.slice(0,100)}`);}
      const data=await res.json();
      if(data.ok&&data.results){
        const m={};const errs=[];
        data.results.forEach(r=>{if(r.image_url)m[r.style_no]=r.image_url;else if(r.error)errs.push(`${r.style_no}:${r.error.slice(0,60)}`);});
        setImgMap(m);
        const errTxt=errs.length?` (失敗:${errs.slice(0,2).join(' | ')})`:'';
        setExtractMsg(`✅ 自動抽圖完成:${data.uploaded}/${data.extracted} 張已上傳${errTxt}`);
      }
    }catch(ex){setExtractMsg(`⚠ 自動抽圖失敗(可手動補):${ex.message.slice(0,80)}`);}
    setExtracting(false);
  };

  // 批量處理:onFiles 已解析好 parsed/qtyA/qtyB,這裡只負責寫入資料庫
  const runBatch=async()=>{
    setBusy(true);
    const updated=[...queue];
    for(let i=0;i<updated.length;i++){
      if(updated[i].status!=='pending')continue;
      updated[i].status='processing';setQueue([...updated]);
      try{
        const f=updated[i].file;
        const clean=(updated[i].parsed||[]).map(x=>({...x,brand:updated[i].parsedBrand}));
        if(!clean.length)throw new Error("無有效資料");
        const {data,error}=await sb.rpc('rpc_import_commit',{p_filename:f.name,p_brand:updated[i].parsedBrand,p_period:updated[i].parsedPeriod,p_release_date:null,p_records:clean,p_expected_total:updated[i].totalQty});
        if(error)throw error;
        updated[i]={...updated[i],status:'done',result:data};
      }catch(ex){updated[i]={...updated[i],status:'error',error:ex.message};}
      setQueue([...updated]);
    }
    setBusy(false);setStage('batch_done');
  };

  const total=rows.reduce((s,r)=>s+(parseInt(r.qty)||0),0);
  const totalA=rows.filter(r=>r.grade==='A').reduce((s,r)=>s+(parseInt(r.qty)||0),0);
  const totalB=rows.filter(r=>r.grade==='B').reduce((s,r)=>s+(parseInt(r.qty)||0),0);
  const setCell=(i,k,v)=>{const n=[...rows];n[i]={...n[i],[k]:v};setRows(n);};
  const delRow=(i)=>setRows(rows.filter((_,j)=>j!==i));
  const addRow=()=>setRows([...rows,{brand,period,line:"",grade:"A",style_no:"",part:"",color_code:"",color_desc:"",size:"",qty:0,print_mark:""}]);

  const commit=async()=>{
    setBusy(true);setErr("");
    try{
      const clean=rows.filter(r=>r.style_no&&parseInt(r.qty)>0).map(r=>({...r,qty:parseInt(r.qty),brand,image_url:imgMap[r.style_no]||null}));
      if(!clean.length)throw new Error("沒有有效資料列");
      const {data,error}=await sb.rpc('rpc_import_commit',{p_filename:file.name,p_brand:brand,p_period:period,p_release_date:release||null,p_records:clean,p_expected_total:clean.reduce((s,r)=>s+r.qty,0)});
      if(error)throw error;
      if(Object.keys(imgMap).length>0){for(const[sno,url]of Object.entries(imgMap)){await sb.from('products').update({image_url:url}).eq('style_no',sno).is('image_url',null);}}
      setResult(data);setStage('done');
    }catch(ex){setErr(ex.message);}
    setBusy(false);
  };

  const reset=()=>{setStage('idle');setFile(null);setRows([]);setResult(null);setErr("");setImgMap({});setExtractMsg("");setQueue([]);};
  const inp="bg-white border border-slate-200 text-sm rounded-lg px-2 py-1.5 focus:ring-2 focus:ring-indigo-100 outline-none w-full";
  const inpL="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none w-full";

  return <div className="p-4 md:p-8"><Card className="p-5 md:p-7 max-w-6xl">
    <h3 className="font-display font-bold text-lg mb-2">上傳月度庫存 Excel</h3>
    <p className="text-sm text-slate-500 mb-5">可一次選多個檔案批量匯入。單個檔案可在核對畫面修正後入庫。</p>

    {stage==='idle'&&<label className="block border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/30 transition-colors">
      <input type="file" accept=".xls,.xlsx" multiple onChange={onFiles} className="hidden" disabled={busy}/>
      {busy?<div className="flex flex-col items-center gap-3 text-indigo-600"><Spinner/><span className="text-sm font-semibold">解析中…</span></div>:
      <div className="flex flex-col items-center gap-2 text-slate-500">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 20h16" strokeLinecap="round" strokeLinejoin="round"/></svg>
        <span className="text-sm font-semibold">點擊選擇 .xls / .xlsx 檔案（可多選）</span>
        <span className="text-xs text-slate-400">選多個檔案會批量自動匯入，單個檔案可手動核對</span>
      </div>}
    </label>}

    {stage==='batch_queue'&&<div>
      <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 mb-4">
        <div className="font-semibold text-indigo-800 mb-1">📦 批量匯入 {queue.length} 個檔案</div>
        <div className="text-sm text-indigo-700">系統將依序自動解析並入庫。</div>
      </div>
      <div className="space-y-2 mb-4 max-h-64 overflow-auto">
        {queue.map((q,i)=><div key={i} className="flex items-center gap-3 text-sm px-3 py-2.5 bg-slate-50 rounded-lg flex-wrap">
          <span className={`text-xs px-2 py-0.5 rounded font-semibold shrink-0 ${q.status==='done'?'bg-emerald-100 text-emerald-700':q.status==='error'?'bg-rose-100 text-rose-600':q.status==='processing'?'bg-indigo-100 text-indigo-700':q.status==='parsing'?'bg-amber-100 text-amber-700':'bg-slate-200 text-slate-500'}`}>{q.status==='done'?'完成':q.status==='error'?'失敗':q.status==='processing'?'處理中':q.status==='parsing'?'解析中…':'待處理'}</span>
          <span className="flex-1 truncate font-mono text-xs min-w-[140px]">{q.file.name}</span>
          {q.totalQty!=null&&<span className="text-xs text-slate-700 shrink-0 font-semibold">總 {fmt(q.totalQty)}件</span>}
          {q.qtyA>0&&<span className="text-xs text-emerald-600 shrink-0 font-semibold bg-emerald-50 px-2 py-0.5 rounded">A品 {fmt(q.qtyA)}</span>}
          {q.qtyB>0&&<span className="text-xs text-amber-600 shrink-0 font-semibold bg-amber-50 px-2 py-0.5 rounded">B品 {fmt(q.qtyB)}</span>}
          {q.imgStatus&&<span className={`text-xs shrink-0 font-semibold px-2 py-0.5 rounded ${q.imgStatus.startsWith('已抽')?'text-violet-700 bg-violet-50':q.imgStatus==='抽圖中…'?'text-indigo-600 bg-indigo-50':'text-slate-400 bg-slate-100'}`}>{q.imgStatus}</span>}
          {q.error&&<span className="text-xs text-rose-500 truncate max-w-[160px]">{q.error}</span>}
        </div>)}
      </div>
      <div className="flex gap-3">
        <button onClick={reset} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={runBatch} disabled={busy} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2">{busy&&<Spinner/>}開始批量匯入</button>
      </div>
    </div>}

    {stage==='batch_done'&&<div>
      <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-4">
        <div className="font-semibold text-emerald-800 mb-1">✅ 批量匯入完成</div>
        <div className="text-sm text-emerald-700">成功 {queue.filter(q=>q.status==='done').length} 個 / 失敗 {queue.filter(q=>q.status==='error').length} 個 · 抽圖在背景進行,需等待數秒至數十秒</div>
      </div>
      <div className="space-y-2 mb-4 max-h-96 overflow-auto">
        {queue.map((q,i)=><div key={i} className="flex items-center gap-3 text-sm px-3 py-2.5 bg-slate-50 rounded-lg flex-wrap">
          <span className={`text-xs px-2 py-0.5 rounded font-semibold shrink-0 ${q.status==='done'?'bg-emerald-100 text-emerald-700':q.status==='error'?'bg-rose-100 text-rose-600':'bg-slate-200 text-slate-500'}`}>{q.status==='done'?'完成':q.status==='error'?'失敗':'處理中'}</span>
          <span className="flex-1 truncate font-mono text-xs min-w-[140px]">{q.file.name}</span>
          {q.totalQty!=null&&<span className="text-xs text-slate-700 shrink-0 font-semibold">總 {fmt(q.totalQty)}件</span>}
          {q.qtyA>0&&<span className="text-xs text-emerald-600 shrink-0 font-semibold bg-emerald-50 px-2 py-0.5 rounded">A品 {fmt(q.qtyA)}</span>}
          {q.qtyB>0&&<span className="text-xs text-amber-600 shrink-0 font-semibold bg-amber-50 px-2 py-0.5 rounded">B品 {fmt(q.qtyB)}</span>}

          {q.error&&<span className="text-xs text-rose-500 truncate max-w-[260px]">{q.error}</span>}
        </div>)}
      </div>
      <button onClick={reset} className="w-full bg-slate-900 text-white font-semibold py-2.5 rounded-xl">再上傳檔案</button>
    </div>}

    {stage==='edit'&&<div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-3">
        <div className="font-semibold text-amber-800 mb-1">⚠ 核對與修正</div>

      </div>
      {extractMsg&&<div className={`rounded-xl px-4 py-2.5 text-sm mb-3 ${extracting?'bg-indigo-50 text-indigo-700':extractMsg.startsWith('✅')?'bg-emerald-50 text-emerald-700':'bg-amber-50 text-amber-700'}`}>{extracting&&<span className="inline-block mr-2 animate-spin">⟳</span>}{extractMsg}</div>}
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
        <div><label className="text-xs font-semibold text-slate-500">品牌</label><input className={inpL} value={brand} onChange={e=>setBrand(e.target.value)}/></div>
        <div><label className="text-xs font-semibold text-slate-500">月份(淘汰月)</label><input className={inpL} value={period} onChange={e=>setPeriod(e.target.value)}/></div>

      </div>
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <div className="text-sm flex gap-3 flex-wrap">
          <span><span className="text-slate-500">共 </span><b>{rows.length}</b><span className="text-slate-500"> 列 · 總 </span><b className="text-indigo-600 font-mono">{fmt(total)}</b><span className="text-slate-500"> 件</span></span>
          {totalA>0&&<span className="text-emerald-700 font-semibold text-xs bg-emerald-50 px-2 py-1 rounded-lg">A 品 {fmt(totalA)} 件</span>}
          {totalB>0&&<span className="text-amber-700 font-semibold text-xs bg-amber-50 px-2 py-1 rounded-lg">B 品 {fmt(totalB)} 件</span>}
          {Object.keys(imgMap).length>0&&<span className="text-violet-600 font-semibold text-xs bg-violet-50 px-2 py-1 rounded-lg">已抽到 {Object.keys(imgMap).length} 款圖片</span>}
        </div>
        <button onClick={addRow} className="px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 text-sm font-semibold">+ 新增一列</button>
      </div>
      <div className="overflow-auto border border-slate-100 rounded-xl" style={{maxHeight:380}}>
        <table className="w-full text-sm"><thead className="bg-slate-50 sticky top-0"><tr>{['圖','產品線','款號','色號','顏色','等級','尺碼','數量','印花','刪'].map(h=><th key={h} className="px-2 py-2 text-xs font-semibold text-slate-400 whitespace-nowrap">{h}</th>)}</tr></thead>
        <tbody>{rows.map((r,i)=>{const img=imgMap[r.style_no];return <tr key={i} className="border-t border-slate-50">
          <td className="px-1 py-1 w-12">{img?<img src={img} className="w-10 h-10 object-cover rounded-lg" alt=""/>:<div className="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center text-slate-300 text-xs">無圖</div>}</td>
          <td className="px-1 py-1"><input className={inp+" w-20"} value={r.line||''} onChange={e=>setCell(i,'line',e.target.value)}/></td>
          <td className="px-1 py-1"><input className={inp+" w-24 font-mono"} value={r.style_no||''} onChange={e=>setCell(i,'style_no',e.target.value)}/></td>
          <td className="px-1 py-1"><input className={inp+" w-16 font-mono"} value={r.color_code||''} onChange={e=>setCell(i,'color_code',e.target.value)}/></td>
          <td className="px-1 py-1"><input className={inp+" w-28"} value={r.color_desc||''} onChange={e=>setCell(i,'color_desc',e.target.value)}/></td>
          <td className="px-1 py-1"><select className={inp+" w-16"} value={r.grade||'A'} onChange={e=>setCell(i,'grade',e.target.value)}><option>A</option><option>B</option></select></td>
          <td className="px-1 py-1"><input className={inp+" w-16 font-mono"} value={r.size||''} onChange={e=>setCell(i,'size',e.target.value)}/></td>
          <td className="px-1 py-1"><input type="number" className={inp+" w-16 font-mono"} value={r.qty||0} onChange={e=>setCell(i,'qty',e.target.value)}/></td>
          <td className="px-1 py-1"><select className={inp+" w-28"} value={r.print_mark||''} onChange={e=>setCell(i,'print_mark',e.target.value)}>{PRINT_OPTS.map(o=><option key={o} value={o}>{o||'未標記'}</option>)}</select></td>
          <td className="px-1 py-1 text-center"><button onClick={()=>delRow(i)} className="text-rose-400 hover:text-rose-600 font-bold">✕</button></td>
        </tr>;})}
        </tbody></table>
      </div>
      {err&&<div className="mt-4 text-sm text-rose-600 bg-rose-50 rounded-xl px-4 py-3">{err}</div>}
      <div className="flex gap-3 mt-4">
        <button onClick={reset} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={commit} disabled={busy||extracting} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2">{busy&&<Spinner/>}{extracting?'等待抽圖完成…':`確認無誤,入庫 ${fmt(total)} 件`}</button>
      </div>
    </div>}

    {stage==='done'&&result&&<div>
      <div className="bg-emerald-50 rounded-xl p-5 mb-4">
        <div className="font-semibold text-emerald-800 mb-3">✅ 匯入成功 · {result.brand} · {result.period}</div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 text-sm">
          <div><span className="text-slate-500">入庫筆數</span><div className="font-mono font-bold">{fmt(result.parsed_rows)}</div></div>
          <div><span className="text-slate-500">本批總量</span><div className="font-mono font-bold">{fmt(result.excel_total)}</div></div>
          <div><span className="text-slate-500">新增</span><div className="font-mono font-bold text-emerald-600">{fmt(result.new_items)}</div></div>
          <div><span className="text-slate-500">覆蓋</span><div className="font-mono font-bold text-indigo-600">{fmt(result.covered)}</div></div>

          <div><span className="text-slate-500">抽圖</span><div className="font-mono font-bold text-violet-600">{Object.keys(imgMap).length} 款</div></div>
        </div>
      </div>
      <button onClick={reset} className="w-full bg-slate-900 text-white font-semibold py-2.5 rounded-xl">再上傳一個檔案</button>
    </div>}

    {stage==='idle'&&err&&<div className="mt-5 text-sm text-rose-600 bg-rose-50 rounded-xl px-4 py-3">{err}</div>}
  </Card></div>;
}


// ===== 入庫/出庫(表單式,防誤觸)=====
function Move(){
  const [rows,setRows]=useState(null),[err,setErr]=useState(""),[q,setQ]=useState(''),[brand,setBrand]=useState(''),[print,setPrint]=useState(''),[fileq,setFileq]=useState(''),[grade,setGrade]=useState(''),[msg,setMsg]=useState(null);
  const [brands,setBrands]=useState([]),[batches,setBatches]=useState([]);
  const [modal,setModal]=useState(null),[qty,setQty]=useState(""),[note,setNote]=useState(""),[busy,setBusy]=useState(false);
  const [batchModal,setBatchModal]=useState(null); // 整批出庫
  const [brandMgmt,setBrandMgmt]=useState(false),[editingBrand,setEditingBrand]=useState(null),[newBrandName,setNewBrandName]=useState("");
  const renameBrand=async(on,nn)=>{if(!nn.trim()||nn===on)return;try{await sb.from('brands').update({name:nn}).eq('name',on);await sb.from('import_batches').update({brand:nn}).eq('brand',on);setEditingBrand(null);setNewBrandName("");sb.from('v_stock_by_brand').select('brand').then(({data})=>setBrands((data||[]).map(b=>b.brand).filter(Boolean)));sb.from('v_batches').select('*').then(({data})=>setBatches(data||[]));load();}catch(e){alert('更新失敗:'+e.message);}};
  useEffect(()=>{
    sb.from('v_stock_by_brand').select('brand').then(({data})=>setBrands((data||[]).map(b=>b.brand).filter(Boolean)));
    sb.from('v_batches').select('*').then(({data})=>setBatches(data||[]));
  },[]);
  const load=async()=>{try{
    const data=await fetchAllRange(()=>sb.from('v_inventory').select('product_size_id,size_label,total_qty,style_no,part,color_desc,grade,brand,print_mark,last_period,image_url,last_filename').gt('total_qty',0).order('total_qty',{ascending:false}));
    console.log('[Move] 拿到',data.length,'筆,加總',data.reduce((s,r)=>s+(r.total_qty||0),0),'件');
    let list=(data||[]);
    if(brand)list=list.filter(r=>r.brand===brand);
    if(grade)list=list.filter(r=>r.grade===grade);
    if(print==='Y')list=list.filter(r=>/有/.test(r.print_mark||''));
    else if(print==='N')list=list.filter(r=>/無/.test(r.print_mark||''));
    if(q){const k=q.toLowerCase();list=list.filter(r=>(r.style_no||'').toLowerCase().includes(k)||(r.color_desc||'').toLowerCase().includes(k));}
    if(fileq)list=list.filter(r=>r.last_filename===fileq);
    setRows(list);
  }catch(e){setErr(e.message);}};
  useEffect(()=>{const t=setTimeout(load,300);return()=>clearTimeout(t);},[q,brand,print,fileq,grade]);
  const showMsg=(m,ok)=>{setMsg({m,ok});setTimeout(()=>setMsg(null),3500);};
  const openModal=(row,action)=>{setModal({row,action});setQty("");setNote("");setErr("");};
  const submit=async()=>{
    const n=parseInt(qty);if(!n||n<=0){showMsg("請輸入大於 0 的數量",false);return;}
    setBusy(true);
    try{
      if(modal.action==='OUT'){const {data,error}=await sb.rpc('rpc_stock_out',{p_product_size_id:modal.row.product_size_id,p_qty:n,p_note:note||null});if(error)throw error;showMsg(`出庫成功 · 剩餘 ${data}`,true);}
      else{const {data,error}=await sb.rpc('rpc_stock_in',{p_product_size_id:modal.row.product_size_id,p_qty:n,p_note:note||null});if(error)throw error;showMsg(`入庫成功 · 現有 ${data}`,true);}
      setModal(null);
      await refreshAll();
    }catch(e){showMsg(e.message,false);}
    setBusy(false);
  };
  const refreshAll=async()=>{
    // 延遲 300ms 讓資料庫視圖確實更新後再拉
    await new Promise(r=>setTimeout(r,300));
    await load();
    const {data:bd}=await sb.from('v_batches').select('*').limit(10000);
    setBatches(bd||[]);
  };
  const doBatchOut=async()=>{
    setBusy(true);
    try{
      const {data,error}=await sb.rpc('rpc_batch_out',{p_batch_id:batchModal.id,p_note:'整批出庫 '+batchModal.brand+' '+batchModal.period});
      if(error)throw error;
      showMsg(`整批出庫成功 · ${data.out_items}項 ${fmt(data.out_qty)}件`,true);
      setBatchModal(null);
      await refreshAll();
    }catch(e){showMsg(e.message,false);}
    setBusy(false);
  };
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";
  const today=new Date().toISOString().slice(0,10);
  const relTag=(d)=>{if(!d)return <span className="text-slate-300">—</span>;return <span className={`px-1.5 py-0.5 rounded text-[10px] font-semibold ${d<=today?'bg-slate-100 text-slate-500':'bg-rose-100 text-rose-600'}`}>{d}</span>;};
  const printTag=(p)=>{if(!p)return <span className="text-slate-300 text-xs">—</span>;const has=/有/.test(p);return <span className={`px-1.5 py-0.5 rounded text-[10px] font-semibold ${has?'bg-violet-100 text-violet-700':'bg-slate-100 text-slate-500'}`}>{has?'有印花':'無印花'}</span>;};

  return <div className="p-4 md:p-8 space-y-4">

        <button key={i} onClick={()=>setBatchModal(b)} className="px-3 py-2 rounded-xl border border-slate-200 hover:border-rose-300 hover:bg-rose-50 text-sm text-left">
          <div className="font-semibold text-slate-700">{b.brand} · {b.period}</div>
          <div className="text-xs text-slate-400">{fmt(b.total_qty)}件</div>
        </button>):<span className="text-sm text-slate-400">尚無可出庫批次</span>}</div>
    </Card>
    <Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <div className="flex items-center gap-1">
        <select className={sel} value={brand} onChange={e=>setBrand(e.target.value)}><option value="">全部品牌</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
        <button onClick={()=>setBrandMgmt(!brandMgmt)} title="管理品牌名稱" className="p-2 rounded-lg bg-slate-50 hover:bg-indigo-50 text-slate-500 hover:text-indigo-600">✏</button>
      </div>
      <select className={sel} value={grade} onChange={e=>setGrade(e.target.value)}><option value="">A/B 品</option><option value="A">A 品</option><option value="B">B 品</option></select>
      <select className={sel} value={print} onChange={e=>setPrint(e.target.value)}><option value="">印花不限</option><option value="Y">有印花</option><option value="N">無印花</option></select>
      <input className={sel+" flex-1 min-w-[140px]"} placeholder="搜尋款號/顏色…" value={q} onChange={e=>setQ(e.target.value)}/>
      <select className={sel+" max-w-[260px]"} value={fileq} onChange={e=>setFileq(e.target.value)}><option value="">全部來源檔</option>{[...new Set(batches.filter(b=>(b.total_qty||0)>0).map(b=>b.filename).filter(Boolean))].sort().map(f=><option key={f} value={f} title={f}>{f.length>30?f.slice(0,29)+'…':f}</option>)}</select>
      {rows&&<>
        <Pill tone="indigo">{fmt(rows.length)} 列</Pill>
        <Pill tone="A">A品 {fmt(rows.filter(r=>r.grade==='A').reduce((s,r)=>s+(r.total_qty||0),0))}</Pill>
        <Pill tone="B">B品 {fmt(rows.filter(r=>r.grade==='B').reduce((s,r)=>s+(r.total_qty||0),0))}</Pill>
        <Pill tone="slate">總 {fmt(rows.reduce((s,r)=>s+(r.total_qty||0),0))} 件</Pill>
      </>}
    </div>
    {brandMgmt&&<div className="px-4 md:px-6 py-3 border-b border-slate-100 bg-slate-50/50"><div className="text-xs font-semibold text-slate-400 mb-2">點擊品牌名稱可重新命名</div><div className="flex flex-wrap gap-2">{brands.map(b=><div key={b} className="flex items-center gap-1.5">{editingBrand===b?<><input autoFocus value={newBrandName} onChange={e=>setNewBrandName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&renameBrand(b,newBrandName)} className="text-xs border border-indigo-300 rounded-lg px-2 py-1 w-28 outline-none"/><button onClick={()=>renameBrand(b,newBrandName)} className="text-xs text-indigo-600 font-semibold">確認</button><button onClick={()=>setEditingBrand(null)} className="text-xs text-slate-400">取消</button></>:<button onClick={()=>{setEditingBrand(b);setNewBrandName(b);}} className="text-xs bg-white hover:bg-indigo-50 text-slate-700 px-3 py-1.5 rounded-lg font-semibold border border-slate-200">✏ {b}</button>}</div>)}</div></div>}

        <td className="px-3 py-3 text-right whitespace-nowrap">
          <button onClick={()=>openModal(d,'IN')} className="px-2.5 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 hover:bg-emerald-100 text-sm font-semibold mr-1.5">入</button>
          <button onClick={()=>openModal(d,'OUT')} className="px-2.5 py-1.5 rounded-lg bg-rose-50 text-rose-600 hover:bg-rose-100 text-sm font-semibold">出</button>
        </td></tr>)}</tbody>
    </table></div>}
    </Card>
  {modal&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={()=>!busy&&setModal(null)}>
    <Card className="w-full max-w-md p-6"><div onClick={e=>e.stopPropagation()}>

      <input value={note} onChange={e=>setNote(e.target.value)} className={sel+" w-full mb-5"} placeholder="原因/單號…"/>
      <div className="flex gap-3">
        <button onClick={()=>setModal(null)} disabled={busy} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={submit} disabled={busy} className={`flex-1 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2 ${modal.action==='OUT'?'bg-rose-600 hover:bg-rose-700':'bg-emerald-600 hover:bg-emerald-700'}`}>{busy&&<Spinner/>}確認{modal.action==='OUT'?'出庫':'入庫'}</button>
      </div>
    </div></Card>
  </div>}
  {batchModal&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={()=>!busy&&setBatchModal(null)}>
    <Card className="w-full max-w-md p-6"><div onClick={e=>e.stopPropagation()}>
      <h3 className="font-display font-bold text-lg mb-1">整批出庫</h3>
      <div className="text-sm text-slate-600 mb-3">{batchModal.brand} · {batchModal.period} · 來源檔 <span className="font-mono text-xs">{batchModal.filename}</span></div>
      <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-sm text-amber-700 mb-4">將把這批目前所有庫存(約 {fmt(batchModal.total_qty)} 件)一次出清,此動作會產生出庫紀錄。</div>
      <div className="flex gap-3">
        <button onClick={()=>setBatchModal(null)} disabled={busy} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={doBatchOut} disabled={busy} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2">{busy&&<Spinner/>}確認整批出庫</button>
      </div>
    </div></Card>
  </div>}
  {msg&&<div className={`fixed bottom-20 md:bottom-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3.5 rounded-2xl text-sm font-semibold shadow-lg ${msg.ok?'bg-slate-900 text-white':'bg-rose-600 text-white'}`}>{msg.m}</div>}
  </div>;
}

  return <div className="p-4 md:p-8"><Card className="overflow-hidden">

      <input className={sel+" flex-1 min-w-[160px]"} placeholder="搜尋款號/品牌…" value={q} onChange={e=>setQ(e.target.value)}/>

  </Card>
  {batchDelConfirm&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={()=>!busy&&setBatchDelConfirm(false)}>
    <Card className="w-full max-w-md p-6"><div onClick={e=>e.stopPropagation()}>

      <div className="text-sm text-slate-600 mb-2">共選取 <b>{selected.size}</b> 筆紀錄</div>
      <div className="bg-rose-50 rounded-lg px-3 py-2 text-xs text-rose-600 mb-5">每筆刪除後庫存會連動回沖，此動作無法復原。</div>
      <div className="flex gap-3">
        <button onClick={()=>setBatchDelConfirm(false)} disabled={busy} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>

      </div>

  </div>}
  {edit&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={()=>!busy&&setEdit(null)}>
    <Card className="w-full max-w-md p-6"><div onClick={e=>e.stopPropagation()}>

// ===== 款式照片管理(手動上傳,存 Supabase Storage)=====
function Photos(){
  const [rows,setRows]=useState(null),[err,setErr]=useState(""),[q,setQ]=useState(''),[brand,setBrand]=useState(''),[onlyNo,setOnlyNo]=useState(false);
  const [brands,setBrands]=useState([]),[msg,setMsg]=useState(null),[upId,setUpId]=useState(null);
  useEffect(()=>{sb.from('v_stock_by_brand').select('brand').then(({data})=>setBrands((data||[]).map(b=>b.brand).filter(Boolean)));},[]);
  const renameBrand=async(on,nn)=>{if(!nn.trim()||nn===on)return;try{await sb.from('brands').update({name:nn}).eq('name',on);await sb.from('import_batches').update({brand:nn}).eq('brand',on);setEditingBrand(null);setNewBrandName("");sb.from('v_stock_by_brand').select('brand').then(({data})=>setBrands((data||[]).map(b=>b.brand).filter(Boolean)));setRows(null);}catch(e){alert('更新失敗:'+e.message);}};
  const load=async()=>{try{
    // 以款式為單位(去重),取每款一筆
    const {data,error}=await sb.from('products').select('id,style_no,part,color_code,color_desc,grade,print_mark,image_url,brand_lines(canonical,brands(name))').limit(1000);
    if(error)throw error;
    let list=(data||[]).map(p=>({id:p.id,style_no:p.style_no,part:p.part,color_code:p.color_code,color_desc:p.color_desc,grade:p.grade,print_mark:p.print_mark,image_url:p.image_url,brand_line:p.brand_lines?.canonical,brand:p.brand_lines?.brands?.name}));
    if(brand)list=list.filter(r=>r.brand===brand);
    if(onlyNo)list=list.filter(r=>!r.image_url);
    if(q){const k=q.toLowerCase();list=list.filter(r=>(r.style_no||'').toLowerCase().includes(k)||(r.color_desc||'').toLowerCase().includes(k));}
    setRows(list);
  }catch(e){setErr(e.message);}};
  useEffect(()=>{const t=setTimeout(load,300);return()=>clearTimeout(t);},[q,brand,onlyNo]);
  const showMsg=(m,ok)=>{setMsg({m,ok});setTimeout(()=>setMsg(null),3500);};
  const onUpload=async(prod,file)=>{
    if(!file)return;setUpId(prod.id);
    try{
      const ext=(file.name.split('.').pop()||'png').toLowerCase();
      const path=`${prod.style_no}_${prod.color_code||'x'}_${prod.grade}_${Date.now()}.${ext}`.replace(/[^0-9A-Za-z._-]/g,'_');
      const {error:upErr}=await sb.storage.from('product-images').upload(path,file,{upsert:true});
      if(upErr)throw upErr;
      const {data:pub}=sb.storage.from('product-images').getPublicUrl(path);
      const url=pub.publicUrl;
      const {error:dbErr}=await sb.from('products').update({image_url:url}).eq('id',prod.id);
      if(dbErr)throw dbErr;
      showMsg("照片已上傳",true);load();
    }catch(e){showMsg("上傳失敗:"+e.message,false);}
    setUpId(null);
  };
  const [batchBusy,setBatchBusy]=useState(false),[batchLog,setBatchLog]=useState(null);
  const onBatchUpload=async(files)=>{
    if(!files||!files.length)return;
    setBatchBusy(true);setBatchLog(null);
    // 取得所有款式(用款號比對)
    let prods=[];
    try{
      const {data}=await sb.from('products').select('id,style_no,color_code,grade,image_url').limit(2000);
      prods=data||[];
    }catch(e){showMsg("讀取款式失敗:"+e.message,false);setBatchBusy(false);return;}
    let ok=0,skip=0,fail=0;const fails=[];
    for(const file of files){
      // 從檔名抓款號(開頭的字母數字,到第一個 _ 或 . 或空格)
      const base=file.name.replace(/\.(png|jpg|jpeg|webp|gif)$/i,'');
      const m=base.match(/^([A-Za-z]{2,4}\d{3,})/);
      const styleKey=m?m[1].toUpperCase():base.toUpperCase();
      // 找符合款號的款式(可能多筆同款不同色,全配同圖)
      const targets=prods.filter(p=>(p.style_no||'').toUpperCase()===styleKey);
      if(!targets.length){skip++;fails.push(file.name+"(找不到款號)");continue;}
      try{
        const ext=(file.name.split('.').pop()||'png').toLowerCase();
        const path=`${styleKey}_${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`.replace(/[^0-9A-Za-z._-]/g,'_');
        const {error:upErr}=await sb.storage.from('product-images').upload(path,file,{upsert:true});
        if(upErr)throw upErr;
        const url=sb.storage.from('product-images').getPublicUrl(path).data.publicUrl;
        for(const t of targets){
          await sb.from('products').update({image_url:url}).eq('id',t.id);
        }
        ok++;
      }catch(e){fail++;fails.push(file.name+"("+e.message+")");}
    }
    setBatchLog({ok,skip,fail,fails:fails.slice(0,10)});
    setBatchBusy(false);load();
  };
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";
  return <div className="p-4 md:p-8"><Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <select className={sel} value={brand} onChange={e=>setBrand(e.target.value)}><option value="">全部品牌</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
      <input className={sel+" flex-1 min-w-[160px]"} placeholder="搜尋款號/顏色…" value={q} onChange={e=>setQ(e.target.value)}/>
      <label className="flex items-center gap-2 text-sm text-slate-600 cursor-pointer"><input type="checkbox" checked={onlyNo} onChange={e=>setOnlyNo(e.target.checked)}/>只看缺照片</label>
      <label className={`px-4 py-2.5 rounded-xl text-sm font-semibold cursor-pointer ${batchBusy?'bg-slate-100 text-slate-400':'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
        {batchBusy?'批次上傳中…':'📦 批次配對上傳'}
        <input type="file" accept="image/*" multiple className="hidden" disabled={batchBusy} onChange={e=>onBatchUpload(Array.from(e.target.files))}/>
      </label>
      {rows&&<Pill tone="indigo">{fmt(rows.length)} 款</Pill>}
    </div>
    <div className="px-4 md:px-6 py-2 bg-indigo-50 text-xs text-indigo-700 border-b border-indigo-100">💡 批次配對上傳:一次選多張圖,系統依「檔名開頭的款號」自動配對(例如 KDC240018.png 會自動配到 KDC240018 這款)。Claude 幫你從 Excel 抽好的圖,檔名就是款號,直接整批選起來即可。</div>
    {batchLog&&<div className="px-4 md:px-6 py-3 bg-emerald-50 border-b border-emerald-100 text-sm">
      <span className="font-semibold text-emerald-800">批次完成:</span> 成功 {batchLog.ok} · 找不到款號略過 {batchLog.skip} · 失敗 {batchLog.fail}
      {batchLog.fails.length>0&&<div className="mt-1 text-xs text-slate-500">未配對:{batchLog.fails.join("、")}</div>}
    </div>}
    {err?<ErrBox msg={err}/>:!rows?<Loading/>:rows.length===0?<Empty msg="無款式"/>:
    <div className="p-4 md:p-6 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" style={{maxHeight:560,overflow:'auto'}}>
      {rows.map(d=><div key={d.id} className="border border-slate-100 rounded-xl overflow-hidden">
        <div className="aspect-square bg-slate-50 flex items-center justify-center overflow-hidden">
          {d.image_url?<img src={d.image_url} alt={d.style_no} className="w-full h-full object-cover"/>:
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>}
        </div>
        <div className="p-2.5">
          <div className="font-mono font-semibold text-sm truncate">{d.style_no}{d.part?'/'+d.part:''}</div>
          <div className="text-xs text-slate-400 truncate">{d.color_desc} · {d.grade}品</div>
          <label className="mt-2 block text-center text-xs font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-lg py-1.5 cursor-pointer">
            {upId===d.id?'上傳中…':(d.image_url?'更換照片':'上傳照片')}
            <input type="file" accept="image/*" className="hidden" disabled={upId===d.id} onChange={e=>onUpload(d,e.target.files[0])}/>
          </label>
        </div>
      </div>)}
    </div>}
  </Card>
  {msg&&<div className={`fixed bottom-20 md:bottom-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3.5 rounded-2xl text-sm font-semibold shadow-lg ${msg.ok?'bg-slate-900 text-white':'bg-rose-600 text-white'}`}>{msg.m}</div>}
  </div>;
}

  return <div className="min-h-screen grain">
    <aside className="hidden md:flex fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-100 flex-col z-20">
      <div className="px-6 py-7 flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10m0-10L4 7" strokeLinecap="round" strokeLinejoin="round"/></svg></div><div><div className="font-display font-extrabold text-lg leading-none">StockSense</div><div className="text-xs text-slate-400 mt-1">成衣倉儲管理</div></div></div>
      <nav className="flex-1 px-3 space-y-1 mt-2">{nav.map(([k])=><button key={k} onClick={()=>setTab(k)} className={`w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-all ${safeTab===k?'bg-indigo-50 text-indigo-700':'text-slate-500 hover:bg-slate-50'}`}>{titles[k][0]}</button>)}</nav>
      <div className="p-4 m-3 rounded-xl bg-slate-50 border border-slate-100"><Pill tone={role==='admin'?'indigo':'slate'}>{role==='admin'?'管理員':'理貨員'}</Pill><div className="text-xs text-slate-500 truncate mt-2">{profile.email}</div><button onClick={logout} className="mt-3 text-xs font-semibold text-rose-500">登出</button></div>
    </aside>
    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around px-1 py-2">{nav.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={`flex flex-col items-center px-3 py-1 rounded-xl text-xs font-semibold ${safeTab===k?'text-indigo-600':'text-slate-400'}`}>{l}</button>)}</nav>
    <div className="md:ml-64 pb-20 md:pb-0">
      <header className="sticky top-0 z-10 backdrop-blur-md bg-white/80 border-b border-slate-100 px-4 md:px-8 py-4 md:py-5 flex items-center justify-between"><div><h1 className="font-display font-bold text-lg md:text-xl">{titles[safeTab][0]}</h1><p className="text-xs md:text-sm text-slate-500 mt-0.5">{titles[safeTab][1]}</p></div><button onClick={logout} className="md:hidden text-xs font-semibold text-rose-500">登出</button></header>
      <main className="fade-up" key={safeTab}>
        {safeTab==='overview'&&<Overview/>}{safeTab==='inventory'&&<Inventory/>}{safeTab==='import'&&<ImportPage/>}{safeTab==='move'&&<Move/>}{safeTab==='history'&&<History/>}{safeTab==='photos'&&<Photos/>}
      </main>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<!-- 主應用結束 -->
</body>
</html>
