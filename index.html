<!-- ===== CARTER'S 解析器(移植自已驗證的 Python 版,瀏覽器內解析)===== -->
<script>
(function(){
  function clean(s){if(s==null)return "";s=String(s).replace(/\n/g," ").trim();return s.replace(/\s+/g," ");}
  function toQty(v){
    if(typeof v==="boolean")return null;
    if(typeof v==="number")return v>0?Math.trunc(v):null;
    const s=clean(v);
    if(/^\d+(\.0+)?$/.test(s)){const n=Math.trunc(parseFloat(s));return n>0?n:null;}
    return null;
  }
  function normStyle(s){
    s=clean(s);let part="";
    const m=s.match(/(上衣|裤子|褲子|頭巾)/);
    if(m){part=m[1];if(part==="褲子")part="裤子";}
    const main=s.replace(/\s*(上衣|裤子|褲子|頭巾)\s*/g,"").trim();
    return [main,part];
  }
  function parseColor(raw){
    const c=clean(raw);const m=c.match(/^([A-Z]{2,4}\d{1,3})\s*(.*)$/);
    return [m?m[1]:"", m?m[2]:c];
  }
  function looksLikeSize(v){
    let s=clean(v).toUpperCase();if(s==="")return false;
    if(["NB","XS","S","M","L","XL","XXL","XXXL","PP","P"].includes(s))return true;
    if(/^\d{1,3}M$/.test(s))return true;
    if(/^\d[T]$/.test(s))return true;
    if(/^\d{2,3}CM$/.test(s))return true;
    if(/^\d{1,2}(\.0)?$/.test(s)){const n=Math.trunc(parseFloat(s));return n>=2&&n<=16;}
    return false;
  }
  function cellVal(rows,r,c){if(r<0||r>=rows.length)return "";const row=rows[r];if(!row||c<0||c>=row.length)return "";const v=row[c];return v==null?"":v;}
  function nrows(rows){return rows.length;}
  function ncols(rows){return rows.reduce((m,r)=>Math.max(m,r?r.length:0),0);}
  function findSizeHeader(rows){
    let best=[null,{}];const lim=Math.min(6,nrows(rows));const nc=ncols(rows);
    for(let r=0;r<lim;r++){const sizemap={};
      for(let c=0;c<nc;c++){const v=cellVal(rows,r,c);
        if(looksLikeSize(v)){let s=clean(v).toUpperCase();if(/^\d{1,2}(\.0)?$/.test(s))s=String(Math.trunc(parseFloat(s)));sizemap[c]=s;}}
      if(Object.keys(sizemap).length>Object.keys(best[1]).length)best=[r,sizemap];
    }
    if(best[0]!==null&&Object.keys(best[1]).length>=2)return best;
    return [null,{}];
  }
  function isASheet(name){return (name.includes("A品")||name.includes("A 品"))&&!name.includes("B品")&&!name.includes("B-品");}
  function isBSheet(name){const n=name.trim();return n==="B品"||n==="B-品"||n.startsWith("B品")||n.startsWith("B-品");}
  function lineCode(sheetName){
    const n=clean(sheetName);const m=n.match(/^([A-Z]{2,4})/);let base=m?m[1]:n;let sub="";
    if(n.includes("上衣"))sub="上衣";else if(n.includes("裤子")||n.includes("褲子"))sub="裤子";
    return (base+sub).trim();
  }
  function parseASheet(rows,sheetName,period){
    const [hdrRow,sizemap]=findSizeHeader(rows);
    if(hdrRow===null||Object.keys(sizemap).length===0)return [];
    const styleCol=3,colorCol=4;const records=[];const nc=ncols(rows);
    for(let r=hdrRow+1;r<nrows(rows);r++){
      let styleRaw=styleCol<nc?clean(cellVal(rows,r,styleCol)):"";
      if(styleRaw.toUpperCase().startsWith("TTL"))continue;
      if(clean(cellVal(rows,r,0)).toUpperCase().startsWith("TTL"))continue;
      if(!styleRaw||!/[A-Z]{2,4}\d/.test(styleRaw))continue;
      const [style,part]=normStyle(styleRaw);
      const [cc,cd]=parseColor(colorCol<nc?cellVal(rows,r,colorCol):"");
      for(const c in sizemap){const size=sizemap[c];const q=toQty(cellVal(rows,r,parseInt(c)));
        if(q)records.push({period,line:lineCode(sheetName),grade:"A",style_no:style,part,color_code:cc,color_desc:cd,size,qty:q,brand:"Carter"});}
    }
    return records;
  }
  function parseBSheet(rows,period){
    let hdr=null,cols=null;const lim=Math.min(5,nrows(rows));const nc=ncols(rows);
    for(let r=0;r<lim;r++){const row=[];for(let c=0;c<nc;c++)row.push(clean(cellVal(rows,r,c)));
      const j=row.join(" ");if(j.includes("款號")&&(j.includes("数量")||j.includes("數量"))){hdr=r;cols=row;break;}}
    if(hdr===null)return [];
    const colidx=(...keys)=>{for(let i=0;i<cols.length;i++)if(keys.some(k=>cols[i].includes(k)))return i;return null;};
    const ciStyle=colidx("款號"),ciColor=colidx("顏色","顔色"),ciQty=colidx("数量","數量");
    const records=[];
    for(let r=hdr+1;r<nrows(rows);r++){
      const styleRaw=ciStyle!==null?clean(cellVal(rows,r,ciStyle)):"";
      if(!styleRaw||!/[A-Z]{2,4}\d/.test(styleRaw))continue;
      const qty=ciQty!==null?toQty(cellVal(rows,r,ciQty)):null;if(!qty)continue;
      const [cc,cd]=parseColor(ciColor!==null?cellVal(rows,r,ciColor):"");
      const [bs,bp]=normStyle(styleRaw);
      records.push({period,line:"B品",grade:"B",style_no:bs,part:bp,color_code:cc,color_desc:cd,size:"(未分尺碼)",qty,brand:"Carter"});
    }
    return records;
  }
  function periodFromFilename(fn){
    let m=fn.match(/(\d{4})[-_年](\d{1,2})/);
    if(m)return m[1]+"-"+String(m[2]).padStart(2,"0");
    return fn;
  }
  function brandFromFilename(fn){
    let s=fn.replace(/\.(xls|xlsx)$/i,"");
    let m=s.match(/^([A-Za-z_'\-]+?)[\s_]*\d{4}/);
    let brand=m?m[1]:s; brand=brand.replace(/_/g," ").replace(/\s+/g," ").trim();
    if(/carter/i.test(brand))brand="Carter's";
    return brand||"(未知品牌)";
  }
  window.brandFromFilename=brandFromFilename;
  window.periodFromFilename=periodFromFilename;
  window.parseCartersWorkbook=function(arrayBuffer,filename){
    const period=periodFromFilename(filename);
    const wb=XLSX.read(arrayBuffer,{type:"array"});
    let recs=[];
    for(const name of wb.SheetNames){
      const ws=wb.Sheets[name];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
      if(isBSheet(name))recs=recs.concat(parseBSheet(rows,period));
      else if(isASheet(name))recs=recs.concat(parseASheet(rows,name,period));
    }
    return recs;
  };
})();
</script>

<script type="text/babel">
const {useState,useEffect,useMemo}=React;
const fmt=n=>(n??0).toLocaleString('en-US');
const sb=window.supabase.createClient(window.CONFIG.SUPABASE_URL,window.CONFIG.SUPABASE_ANON);

const Pill=({children,tone})=>{const m={A:'bg-emerald-100 text-emerald-700',B:'bg-amber-100 text-amber-700',indigo:'bg-indigo-100 text-indigo-700',slate:'bg-slate-100 text-slate-600'};return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${m[tone]||m.slate}`}>{children}</span>;};
const Card=({children,className=''})=><div className={`bg-white rounded-2xl border border-slate-100 shadow-sm ${className}`}>{children}</div>;
const Spinner=()=><svg className="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 12a9 9 0 11-6.219-8.56" strokeLinecap="round"/></svg>;
const Loading=()=><div className="flex items-center justify-center py-20 text-slate-400 gap-3"><Spinner/>載入中…</div>;
const ErrBox=({msg})=><div className="m-4 md:m-8 text-sm text-rose-600 bg-rose-50 rounded-xl px-4 py-3">⚠ {msg}</div>;
const Empty=({msg})=><div className="text-center text-slate-400 py-12 text-sm">{msg}</div>;

// ===== 登入頁 =====
function Login(){

  const submit=async()=>{setErr("");setBusy(true);
    try{const {error}=await sb.auth.signInWithPassword({email,password:pw});if(error)throw error;}
    catch(e){setErr(e.message||"登入失敗");}setBusy(false);};
  return <div className="min-h-screen grain flex items-center justify-center p-6">
    <Card className="w-full max-w-sm p-8">
      <div className="flex items-center gap-3 mb-7">
        <div className="w-11 h-11 rounded-xl bg-indigo-600 flex items-center justify-center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10m0-10L4 7" strokeLinecap="round" strokeLinejoin="round"/></svg></div>
        <div><div className="font-display font-extrabold text-xl">StockSense</div><div className="text-xs text-slate-400">成衣倉儲管理系統</div></div></div>
      <label className="block text-sm font-semibold text-slate-600 mb-1.5">電子郵件</label>
      <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} type="email" placeholder="you@factory.com"
        className="w-full mb-4 bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none"/>
      <label className="block text-sm font-semibold text-slate-600 mb-1.5">密碼</label>
      <input value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} type="password" placeholder="••••••••"
        className="w-full mb-5 bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 outline-none"/>
      {err&&<div className="mb-4 text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2">{err}</div>}
      <button onClick={submit} disabled={busy} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors disabled:opacity-60 flex items-center justify-center gap-2">{busy&&<Spinner/>}登入</button>
      <p className="text-xs text-slate-400 text-center mt-4">帳號由管理員建立 · 忘記密碼請洽管理員</p>
    </Card></div>;
}
// ===== 總覽(品牌彙總 + 解禁狀態)=====
function Overview(){
  const [d,setD]=useState(null),[err,setErr]=useState("");
  useEffect(()=>{(async()=>{
    try{
      const {data:bb,error:e1}=await sb.from('v_stock_by_brand').select('*');if(e1)throw e1;
      const {data:ps,error:e2}=await sb.from('product_sizes').select('total_qty');if(e2)throw e2;
      const {data:pg,error:e3}=await sb.from('products').select('grade,product_sizes(total_qty)');if(e3)throw e3;
      const {data:batches,error:e4}=await sb.from('v_batches').select('*');if(e4)throw e4;
      const total=(ps||[]).reduce((s,r)=>s+r.total_qty,0);
      const active=(ps||[]).filter(r=>r.total_qty>0).length;
      let A=0,B=0;(pg||[]).forEach(p=>{const q=(p.product_sizes||[]).reduce((s,x)=>s+x.total_qty,0);if(p.grade==='A')A+=q;else B+=q;});
      setD({byBrand:(bb||[]).map(r=>({name:r.brand,value:r.total_qty,styles:r.style_count})).sort((a,b)=>b.value-a.value),
        total,active,A,B,batches:batches||[]});
    }catch(e){setErr(e.message);}
  })();},[]);
  if(err)return <ErrBox msg={err}/>;if(!d)return <Loading/>;
  const max=Math.max(1,...d.byBrand.map(x=>x.value));
  const today=new Date().toISOString().slice(0,10);
  const sellable=d.batches.filter(b=>b.release_date&&b.release_date<=today);
  const holding=d.batches.filter(b=>b.release_date&&b.release_date>today);
  const kpis=[['當前總庫存',fmt(d.total),'PCS','text-indigo-600'],['在庫尺碼數',fmt(d.active),'項','text-sky-600'],['A 品庫存',fmt(d.A),'PCS','text-emerald-600'],['B 品庫存',fmt(d.B),'PCS','text-amber-600']];
  return <div className="p-4 md:p-8 space-y-4 md:space-y-6">
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 fade-up">
      {kpis.map(([l,v,u,c])=><Card key={l} className="p-5 md:p-6"><div className="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-3">{l}</div><div className="flex items-baseline gap-1.5"><span className={`font-mono font-extrabold text-2xl md:text-3xl ${c}`}>{v}</span><span className="text-sm text-slate-400">{u}</span></div></Card>)}
    </div>
    <Card className="p-5 md:p-7"><h3 className="font-display font-bold mb-5">各品牌庫存</h3>
      {d.byBrand.length?<div className="space-y-2.5">{d.byBrand.map((r,i)=><div key={i} className="flex items-center gap-3">
        <div className="w-24 text-xs font-semibold text-slate-600 shrink-0 text-right truncate">{r.name||'(未分品牌)'}</div>
        <div className="flex-1 bg-slate-100 rounded-full h-6 overflow-hidden"><div className="h-full bg-indigo-500 rounded-full flex items-center justify-end pr-2" style={{width:Math.max(6,r.value/max*100)+'%'}}><span className="text-xs font-mono font-semibold text-white">{fmt(r.value)}</span></div></div>
        <div className="w-16 text-xs text-slate-400 shrink-0">{fmt(r.styles)}款</div>
      </div>)}</div>:<Empty msg="尚無資料,請先由管理員匯入 Excel"/>}</Card>
    <div className="grid md:grid-cols-2 gap-4 md:gap-6">
      <Card className="p-5 md:p-6"><h3 className="font-display font-bold mb-4 text-emerald-700">✓ 已解禁可販售 ({sellable.length})</h3>
        {sellable.length?<div className="space-y-2 max-h-60 overflow-auto">{sellable.map((b,i)=><div key={i} className="flex justify-between text-sm border-b border-slate-50 pb-1.5"><span className="text-slate-600">{b.brand} · {b.period}</span><span className="font-mono">{fmt(b.total_qty)}件 <span className="text-emerald-600">解禁{b.release_date}</span></span></div>)}</div>:<Empty msg="目前無已解禁批次"/>}</Card>
      <Card className="p-5 md:p-6"><h3 className="font-display font-bold mb-4 text-rose-600">⏳ 保留中 ({holding.length})</h3>
        {holding.length?<div className="space-y-2 max-h-60 overflow-auto">{holding.map((b,i)=><div key={i} className="flex justify-between text-sm border-b border-slate-50 pb-1.5"><span className="text-slate-600">{b.brand} · {b.period}</span><span className="font-mono">{fmt(b.total_qty)}件 <span className="text-rose-500">至{b.release_date}</span></span></div>)}</div>:<Empty msg="目前無保留中批次"/>}</Card>
    </div>
  </div>;
}


// ===== 庫存查詢(品牌/等級/檔名篩選 + 解禁顏色)=====
function Inventory(){
  const [rows,setRows]=useState(null),[err,setErr]=useState(""),[grade,setGrade]=useState(''),[brand,setBrand]=useState(''),[q,setQ]=useState(''),[fileq,setFileq]=useState('');
  const [brands,setBrands]=useState([]);
  useEffect(()=>{sb.from('v_stock_by_brand').select('brand').then(({data})=>setBrands((data||[]).map(b=>b.brand).filter(Boolean)));},[]);
  useEffect(()=>{const t=setTimeout(async()=>{setRows(null);
    try{
      const {data,error}=await sb.from('v_inventory').select('*').gt('total_qty',0).order('total_qty',{ascending:false}).limit(800);
      if(error)throw error;
      let list=(data||[]);
      if(grade)list=list.filter(r=>r.grade===grade);
      if(brand)list=list.filter(r=>r.brand===brand);
      if(q){const k=q.toLowerCase();list=list.filter(r=>(r.style_no||'').toLowerCase().includes(k)||(r.color_desc||'').toLowerCase().includes(k)||(r.color_code||'').toLowerCase().includes(k));}
      if(fileq){const k=fileq.toLowerCase();list=list.filter(r=>(r.last_filename||'').toLowerCase().includes(k));}
      setRows(list);
    }catch(e){setErr(e.message);}
  },300);return()=>clearTimeout(t);},[grade,brand,q,fileq]);
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";
  const today=new Date().toISOString().slice(0,10);
  const relTag=(d)=>{if(!d)return <span className="text-slate-300">—</span>;const ok=d<=today;return <span className={`px-2 py-0.5 rounded text-xs font-semibold ${ok?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-600'}`}>{ok?'可販售':d}</span>;};
  return <div className="p-4 md:p-8"><Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <select className={sel} value={brand} onChange={e=>setBrand(e.target.value)}><option value="">全部品牌</option>{brands.map(b=><option key={b} value={b}>{b}</option>)}</select>
      <select className={sel} value={grade} onChange={e=>setGrade(e.target.value)}><option value="">A/B 品</option><option value="A">A 品</option><option value="B">B 品</option></select>
      <input className={sel+" flex-1 min-w-[140px]"} placeholder="搜尋款號/顏色…" value={q} onChange={e=>setQ(e.target.value)}/>
      <input className={sel+" flex-1 min-w-[140px]"} placeholder="依檔名篩選…" value={fileq} onChange={e=>setFileq(e.target.value)}/>
      {rows&&<Pill tone="indigo">{fmt(rows.length)} 列</Pill>}
    </div>
    {err?<ErrBox msg={err}/>:!rows?<Loading/>:rows.length===0?<Empty msg="無符合資料"/>:
    <div className="overflow-auto" style={{maxHeight:540}}><table className="w-full">
      <thead className="bg-slate-50/80 sticky top-0"><tr>{['品牌','款號','色號','顏色','產品線','等級','尺碼','解禁日','來源檔','件數'].map((h,i)=><th key={h} className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase ${i===9?'text-right':'text-left'}`}>{h}</th>)}</tr></thead>
      <tbody className="divide-y divide-slate-50">{rows.map((d,i)=><tr key={i} className="hover:bg-slate-50">
        <td className="px-4 py-3 text-sm font-semibold text-slate-700">{d.brand||'—'}</td>
        <td className="px-4 py-3 font-mono font-semibold text-sm">{d.style_no}{d.part?<span className="text-slate-400">/{d.part}</span>:''}</td>
        <td className="px-4 py-3 font-mono text-sm text-indigo-600">{d.color_code}</td>
        <td className="px-4 py-3 text-sm text-slate-500 max-w-[160px] truncate">{d.color_desc}</td>
        <td className="px-4 py-3 font-mono text-sm text-slate-600">{d.brand_line}</td>
        <td className="px-4 py-3"><Pill tone={d.grade}>{d.grade} 品</Pill></td>
        <td className="px-4 py-3 font-mono text-sm">{d.size_label}</td>
        <td className="px-4 py-3">{relTag(d.release_date)}</td>
        <td className="px-4 py-3 text-xs text-slate-400 max-w-[160px] truncate" title={d.last_filename}>{d.last_filename||'—'}</td>
        <td className="px-4 py-3 font-mono font-semibold text-sm text-right">{fmt(d.total_qty)}</td></tr>)}</tbody>
    </table></div>}
  </Card></div>;
}


// ===== Excel 匯入(瀏覽器解析 → rpc_import_records)=====
function ImportPage(){
  const [stage,setStage]=useState('idle'); // idle|preview|done
  const [busy,setBusy]=useState(false),[err,setErr]=useState("");
  const [file,setFile]=useState(null),[recs,setRecs]=useState(null),[preview,setPreview]=useState(null);
  const [brand,setBrand]=useState(""),[period,setPeriod]=useState(""),[release,setRelease]=useState("");
  const [result,setResult]=useState(null);
  const onFile=async(e)=>{
    const f=e.target.files[0];if(!f)return;
    setBusy(true);setErr("");setResult(null);setStage('idle');
    try{
      const buf=await f.arrayBuffer();
      const r=window.parseCartersWorkbook(buf,f.name);
      if(!r.length)throw new Error("這個檔案解析不到資料,請確認是月度庫存格式");
      const {data,error}=await sb.rpc('rpc_import_preview',{p_records:r});
      if(error)throw error;
      setFile(f);setRecs(r);setPreview(data);
      setBrand(window.brandFromFilename(f.name));
      setPeriod(window.periodFromFilename(f.name));
      setRelease("");
      setStage('preview');
    }catch(ex){setErr(ex.message);}
    setBusy(false);e.target.value="";
  };
  const commit=async()=>{
    setBusy(true);setErr("");
    try{
      const {data,error}=await sb.rpc('rpc_import_commit',{
        p_filename:file.name,p_brand:brand,p_period:period,
        p_release_date:release||null,p_records:recs,p_expected_total:preview.total_qty});
      if(error)throw error;
      setResult(data);setStage('done');
    }catch(ex){setErr(ex.message);}
    setBusy(false);
  };
  const reset=()=>{setStage('idle');setFile(null);setRecs(null);setPreview(null);setResult(null);setErr("");};
  const inp="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none w-full";

  return <div className="p-4 md:p-8"><Card className="p-6 md:p-8 max-w-2xl">
    <h3 className="font-display font-bold text-lg mb-2">上傳月度庫存 Excel</h3>
    <p className="text-sm text-slate-500 mb-6">流程:選檔解析 → 核對數量(雙重驗證) → 設定品牌與解禁日 → 確認入庫。</p>

    {stage==='idle'&&<label className="block border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/30 transition-colors">
      <input type="file" accept=".xls,.xlsx" onChange={onFile} className="hidden" disabled={busy}/>
      {busy?<div className="flex flex-col items-center gap-3 text-indigo-600"><Spinner/><span className="text-sm font-semibold">解析中…</span></div>:
      <div className="flex flex-col items-center gap-2 text-slate-500"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 20h16" strokeLinecap="round" strokeLinejoin="round"/></svg><span className="text-sm font-semibold">點擊選擇 .xls / .xlsx 檔案</span></div>}
    </label>}

    {stage==='preview'&&preview&&<div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
        <div className="font-semibold text-amber-800 mb-1">⚠ 請核對數量(雙重驗證)</div>
        <div className="text-sm text-amber-700">請對照你手上的 Excel,確認下列數字無誤再入庫。檔案:<span className="font-mono">{file.name}</span></div>
      </div>
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div><label className="text-xs font-semibold text-slate-500">品牌</label><input className={inp} value={brand} onChange={e=>setBrand(e.target.value)}/></div>
        <div><label className="text-xs font-semibold text-slate-500">月份(淘汰月)</label><input className={inp} value={period} onChange={e=>setPeriod(e.target.value)}/></div>
        <div className="col-span-2"><label className="text-xs font-semibold text-slate-500">解禁日(此日後可販售,可留空之後補)</label><input type="date" className={inp} value={release} onChange={e=>setRelease(e.target.value)}/></div>
      </div>
      <div className="bg-slate-50 rounded-xl p-4 mb-4">
        <div className="flex justify-between text-sm mb-2"><span className="text-slate-500">解析總筆數</span><span className="font-mono font-bold">{fmt(preview.parsed_rows)} 筆</span></div>
        <div className="flex justify-between text-sm mb-3"><span className="text-slate-500">總數量</span><span className="font-mono font-extrabold text-lg text-indigo-600">{fmt(preview.total_qty)} 件</span></div>
        <div className="border-t border-slate-200 pt-2">
          <div className="text-xs font-semibold text-slate-400 mb-1.5">各產品線明細</div>
          <div className="space-y-1 max-h-48 overflow-auto">{preview.by_line.map((l,i)=><div key={i} className="flex justify-between text-sm"><span className="font-mono text-slate-600">{l.line}</span><span className="font-mono">{fmt(l.rows)}筆 / <b>{fmt(l.qty)}</b>件</span></div>)}</div>
        </div>
      </div>
      {err&&<div className="mb-4 text-sm text-rose-600 bg-rose-50 rounded-xl px-4 py-3">{err}</div>}
      <div className="flex gap-3">
        <button onClick={reset} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={commit} disabled={busy} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2">{busy&&<Spinner/>}確認數量無誤,入庫</button>
      </div>
    </div>}

    {stage==='done'&&result&&<div>
      <div className="bg-emerald-50 rounded-xl p-5 mb-4">
        <div className="font-semibold text-emerald-800 mb-3">✅ 匯入成功 · {result.brand} · {result.period}</div>
        <div className="grid grid-cols-2 gap-3 text-sm">
          <div><span className="text-slate-500">解析筆數</span><div className="font-mono font-bold">{fmt(result.parsed_rows)}</div></div>
          <div><span className="text-slate-500">本批總量</span><div className="font-mono font-bold">{fmt(result.excel_total)}</div></div>
          <div><span className="text-slate-500">新增累計</span><div className="font-mono font-bold text-emerald-600">{fmt(result.new_items)}</div></div>
          <div><span className="text-slate-500">覆蓋更新</span><div className="font-mono font-bold text-indigo-600">{fmt(result.covered)}</div></div>
          <div><span className="text-slate-500">解禁日</span><div className="font-mono font-bold">{result.release_date||'未設定'}</div></div>
          <div><span className="text-slate-500">系統總庫存</span><div className="font-mono font-extrabold text-lg">{fmt(result.system_total)}</div></div>
        </div>
      </div>
      <button onClick={reset} className="w-full bg-slate-900 text-white font-semibold py-2.5 rounded-xl">再上傳一個檔案</button>
    </div>}

    {stage==='idle'&&err&&<div className="mt-5 text-sm text-rose-600 bg-rose-50 rounded-xl px-4 py-3">{err}</div>}
  </Card></div>;
}


// ===== 入庫/出庫(表單式,防誤觸)=====
function Move(){
  const [rows,setRows]=useState(null),[err,setErr]=useState(""),[q,setQ]=useState(''),[msg,setMsg]=useState(null);
  const [modal,setModal]=useState(null); // {row, action}
  const [qty,setQty]=useState(""),[note,setNote]=useState(""),[busy,setBusy]=useState(false);
  const load=async()=>{try{
    let query=sb.from('v_inventory').select('product_size_id,size_label,total_qty,style_no,part,color_desc,grade,brand,release_date').order('total_qty',{ascending:false}).limit(100);
    const {data,error}=await query;if(error)throw error;
    let list=(data||[]);
    if(q){const k=q.toLowerCase();list=list.filter(r=>(r.style_no||'').toLowerCase().includes(k)||(r.color_desc||'').toLowerCase().includes(k));}
    setRows(list);
  }catch(e){setErr(e.message);}};
  useEffect(()=>{const t=setTimeout(load,300);return()=>clearTimeout(t);},[q]);
  const showMsg=(m,ok)=>{setMsg({m,ok});setTimeout(()=>setMsg(null),3000);};
  const openModal=(row,action)=>{setModal({row,action});setQty("");setNote("");setErr("");};
  const submit=async()=>{
    const n=parseInt(qty);
    if(!n||n<=0){showMsg("請輸入大於 0 的數量",false);return;}
    setBusy(true);
    try{
      if(modal.action==='OUT'){const {data,error}=await sb.rpc('rpc_stock_out',{p_product_size_id:modal.row.product_size_id,p_qty:n,p_note:note||null});if(error)throw error;showMsg(`出庫成功 · 剩餘 ${data}`,true);}
      else{const {data,error}=await sb.rpc('rpc_stock_in',{p_product_size_id:modal.row.product_size_id,p_qty:n,p_note:note||null});if(error)throw error;showMsg(`入庫成功 · 現有 ${data}`,true);}
      setModal(null);load();
    }catch(e){showMsg(e.message,false);}
    setBusy(false);
  };
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";
  const today=new Date().toISOString().slice(0,10);
  const relTag=(d)=>{if(!d)return null;const ok=d<=today;return <span className={`ml-1 px-1.5 py-0.5 rounded text-[10px] font-semibold ${ok?'bg-emerald-100 text-emerald-700':'bg-rose-100 text-rose-600'}`}>{ok?'可售':'保留至'+d}</span>;};
  return <div className="p-4 md:p-8"><Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <input className={sel+" flex-1 min-w-[200px]"} placeholder="搜尋款號/顏色定位品項…" value={q} onChange={e=>setQ(e.target.value)}/>
      <span className="text-xs text-slate-400">點品項的按鈕會跳出表單確認,避免誤觸</span>
    </div>
    {err&&!modal?<ErrBox msg={err}/>:!rows?<Loading/>:
    <div className="overflow-auto" style={{maxHeight:520}}><table className="w-full">
      <thead className="bg-slate-50/80 sticky top-0"><tr>{['款號','顏色','尺碼','等級','解禁','現有','操作'].map((h,i)=><th key={h} className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase ${i>=5?'text-right':'text-left'}`}>{h}</th>)}</tr></thead>
      <tbody className="divide-y divide-slate-50">{rows.map((d,i)=><tr key={i} className="hover:bg-slate-50">
        <td className="px-4 py-3 font-mono font-semibold text-sm">{d.style_no}{d.part?'/'+d.part:''}</td>
        <td className="px-4 py-3 text-sm text-slate-500 max-w-[160px] truncate">{d.color_desc}</td>
        <td className="px-4 py-3 font-mono text-sm">{d.size_label}</td>
        <td className="px-4 py-3"><Pill tone={d.grade}>{d.grade}</Pill></td>
        <td className="px-4 py-3 text-xs">{relTag(d.release_date)||<span className="text-slate-300">—</span>}</td>
        <td className={`px-4 py-3 font-mono font-semibold text-sm text-right ${d.total_qty<=5?'text-rose-500':''}`}>{fmt(d.total_qty)}</td>
        <td className="px-4 py-3 text-right whitespace-nowrap">
          <button onClick={()=>openModal(d,'IN')} className="px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 hover:bg-emerald-100 text-sm font-semibold mr-2">入庫</button>
          <button onClick={()=>openModal(d,'OUT')} className="px-3 py-1.5 rounded-lg bg-rose-50 text-rose-600 hover:bg-rose-100 text-sm font-semibold">出庫</button>
        </td></tr>)}</tbody>
    </table></div>}
  </Card>
  {modal&&<div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" onClick={()=>!busy&&setModal(null)}>
    <Card className="w-full max-w-md p-6" >
      <div onClick={e=>e.stopPropagation()}>
      <h3 className="font-display font-bold text-lg mb-1">{modal.action==='OUT'?'出庫':'入庫'}登記</h3>
      <div className="text-sm text-slate-500 mb-4 font-mono">{modal.row.style_no}{modal.row.part?'/'+modal.row.part:''} · {modal.row.size_label} · 現有 {fmt(modal.row.total_qty)}</div>
      {modal.action==='OUT'&&modal.row.release_date&&modal.row.release_date>today&&<div className="mb-4 text-sm text-rose-600 bg-rose-50 rounded-lg px-3 py-2">⚠ 此批保留至 {modal.row.release_date},尚未解禁。仍可出庫但請留意合約。</div>}
      <label className="block text-sm font-semibold text-slate-600 mb-1.5">數量</label>
      <input autoFocus type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} className={sel+" w-full mb-4 font-mono"} placeholder="輸入數量"/>
      <label className="block text-sm font-semibold text-slate-600 mb-1.5">備註(選填)</label>
      <input value={note} onChange={e=>setNote(e.target.value)} className={sel+" w-full mb-5"} placeholder="原因/單號…"/>
      <div className="flex gap-3">
        <button onClick={()=>setModal(null)} disabled={busy} className="px-5 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-semibold text-sm">取消</button>
        <button onClick={submit} disabled={busy} className={`flex-1 text-white font-semibold py-2.5 rounded-xl disabled:opacity-60 flex items-center justify-center gap-2 ${modal.action==='OUT'?'bg-rose-600 hover:bg-rose-700':'bg-emerald-600 hover:bg-emerald-700'}`}>{busy&&<Spinner/>}確認{modal.action==='OUT'?'出庫':'入庫'}</button>
      </div>
      </div>
    </Card>
  </div>}
  {msg&&<div className={`fixed bottom-20 md:bottom-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3.5 rounded-2xl text-sm font-semibold shadow-lg ${msg.ok?'bg-slate-900 text-white':'bg-rose-600 text-white'}`}>{msg.m}</div>}
  </div>;
}


// ===== 異動歷史 =====
function History(){
  const [rows,setRows]=useState(null),[err,setErr]=useState(""),[q,setQ]=useState(''),[act,setAct]=useState('');
  useEffect(()=>{const t=setTimeout(async()=>{setRows(null);
    try{
      const {data,error}=await sb.from('v_movement_history').select('*').limit(300);
      if(error)throw error;
      let list=(data||[]);
      if(act)list=list.filter(r=>r.action===act);
      if(q){const k=q.toLowerCase();list=list.filter(r=>(r.style_no||'').toLowerCase().includes(k)||(r.brand||'').toLowerCase().includes(k));}
      setRows(list);
    }catch(e){setErr(e.message);}
  },300);return()=>clearTimeout(t);},[q,act]);
  const sel="bg-white border border-slate-200 text-sm rounded-xl px-4 py-2.5 font-medium focus:ring-2 focus:ring-indigo-100 outline-none";
  const actTag=(a)=>{const m={IN:['入庫','bg-emerald-100 text-emerald-700'],OUT:['出庫','bg-rose-100 text-rose-600'],ADJUST:['盤點調整','bg-indigo-100 text-indigo-700']};const x=m[a]||['?','bg-slate-100'];return <span className={`px-2 py-0.5 rounded text-xs font-semibold ${x[1]}`}>{x[0]}</span>;};
  const dt=(s)=>{try{return new Date(s).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}catch{return s;}};
  return <div className="p-4 md:p-8"><Card className="overflow-hidden">
    <div className="p-4 md:p-6 border-b border-slate-100 flex flex-wrap gap-3 items-center">
      <select className={sel} value={act} onChange={e=>setAct(e.target.value)}><option value="">全部異動</option><option value="IN">入庫</option><option value="OUT">出庫</option><option value="ADJUST">盤點調整</option></select>
      <input className={sel+" flex-1 min-w-[160px]"} placeholder="搜尋款號/品牌…" value={q} onChange={e=>setQ(e.target.value)}/>
      {rows&&<Pill tone="indigo">{fmt(rows.length)} 筆</Pill>}
    </div>
    {err?<ErrBox msg={err}/>:!rows?<Loading/>:rows.length===0?<Empty msg="尚無異動紀錄"/>:
    <div className="overflow-auto" style={{maxHeight:560}}><table className="w-full">
      <thead className="bg-slate-50/80 sticky top-0"><tr>{['時間','異動','品牌','款號','尺碼','數量','異動後','備註'].map((h,i)=><th key={h} className={`px-4 py-3 text-xs font-semibold text-slate-400 uppercase ${(i===5||i===6)?'text-right':'text-left'}`}>{h}</th>)}</tr></thead>
      <tbody className="divide-y divide-slate-50">{rows.map((d,i)=><tr key={i} className="hover:bg-slate-50">
        <td className="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">{dt(d.created_at)}</td>
        <td className="px-4 py-3">{actTag(d.action)}</td>
        <td className="px-4 py-3 text-sm">{d.brand||'—'}</td>
        <td className="px-4 py-3 font-mono font-semibold text-sm">{d.style_no}{d.part?'/'+d.part:''}</td>
        <td className="px-4 py-3 font-mono text-sm">{d.size_label}</td>
        <td className={`px-4 py-3 font-mono font-semibold text-sm text-right ${d.delta_qty<0?'text-rose-500':'text-emerald-600'}`}>{d.delta_qty>0?'+':''}{fmt(d.delta_qty)}</td>
        <td className="px-4 py-3 font-mono text-sm text-right text-slate-500">{fmt(d.balance_after)}</td>
        <td className="px-4 py-3 text-xs text-slate-400 max-w-[180px] truncate" title={d.note}>{d.note}</td></tr>)}</tbody>
    </table></div>}
  </Card></div>;
}


// ===== 主應用 =====
function App(){
  const [session,setSession]=useState(undefined),[profile,setProfile]=useState(null),[tab,setTab]=useState('overview');
  useEffect(()=>{sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setSession(s));return()=>sub.subscription.unsubscribe();},[]);
  useEffect(()=>{if(session){sb.from('profiles').select('email,role').eq('id',session.user.id).single().then(({data})=>setProfile(data||{email:session.user.email,role:'picker'}));}else setProfile(null);},[session]);
  const logout=async()=>{await sb.auth.signOut();setTab('overview');};
  if(session===undefined)return <div className="min-h-screen flex items-center justify-center"><Spinner/></div>;
  if(!session)return <Login/>;
  if(!profile)return <div className="min-h-screen flex items-center justify-center"><Spinner/></div>;
  const role=profile.role;
  const nav=[['overview','總覽','all'],['inventory','查詢','all'],['import','匯入','admin'],['move','入出庫','all'],['history','歷史','all']].filter(i=>i[2]==='all'||i[2]===role);
  const safeTab=(tab==='import'&&role!=='admin')?'overview':tab;
  const titles={overview:['總覽儀表板','即時掌握各品牌庫存'],inventory:['庫存查詢','多維度交叉篩選'],import:['Excel 匯入','上傳月度盤點自動更新庫存'],move:['入庫 / 出庫','表單式登記,避免誤觸'],history:['異動歷史','所有入出庫與盤點紀錄']};
  return <div className="min-h-screen grain">
    <aside className="hidden md:flex fixed left-0 top-0 h-full w-64 bg-white border-r border-slate-100 flex-col z-20">
      <div className="px-6 py-7 flex items-center gap-3"><div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10m0-10L4 7" strokeLinecap="round" strokeLinejoin="round"/></svg></div><div><div className="font-display font-extrabold text-lg leading-none">StockSense</div><div className="text-xs text-slate-400 mt-1">成衣倉儲管理</div></div></div>
      <nav className="flex-1 px-3 space-y-1 mt-2">{nav.map(([k])=><button key={k} onClick={()=>setTab(k)} className={`w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-all ${safeTab===k?'bg-indigo-50 text-indigo-700':'text-slate-500 hover:bg-slate-50'}`}>{titles[k][0]}</button>)}</nav>
      <div className="p-4 m-3 rounded-xl bg-slate-50 border border-slate-100"><Pill tone={role==='admin'?'indigo':'slate'}>{role==='admin'?'管理員':'理貨員'}</Pill><div className="text-xs text-slate-500 truncate mt-2">{profile.email}</div><button onClick={logout} className="mt-3 text-xs font-semibold text-rose-500">登出</button></div>
    </aside>
    <nav className="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around px-1 py-2">{nav.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={`flex flex-col items-center px-3 py-1 rounded-xl text-xs font-semibold ${safeTab===k?'text-indigo-600':'text-slate-400'}`}>{l}</button>)}</nav>
    <div className="md:ml-64 pb-20 md:pb-0">
      <header className="sticky top-0 z-10 backdrop-blur-md bg-white/80 border-b border-slate-100 px-4 md:px-8 py-4 md:py-5 flex items-center justify-between"><div><h1 className="font-display font-bold text-lg md:text-xl">{titles[safeTab][0]}</h1><p className="text-xs md:text-sm text-slate-500 mt-0.5">{titles[safeTab][1]}</p></div><button onClick={logout} className="md:hidden text-xs font-semibold text-rose-500">登出</button></header>
      <main className="fade-up" key={safeTab}>
        {safeTab==='overview'&&<Overview/>}{safeTab==='inventory'&&<Inventory/>}{safeTab==='import'&&<ImportPage/>}{safeTab==='move'&&<Move/>}{safeTab==='history'&&<History/>}
      </main>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<!-- 主應用結束 -->
</body>
</html>
